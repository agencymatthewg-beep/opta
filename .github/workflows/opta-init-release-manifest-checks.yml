name: Opta Init Release Manifest Checks

on:
  pull_request:
    paths:
      - "1-Apps/optalocal/1O-Opta-Init/channels/**"
      - "1-Apps/optalocal/1O-Opta-Init/public/desktop/**"
      - "1-Apps/optalocal/1O-Opta-Init/public/desktop-updates/**"
      - "1-Apps/optalocal/1O-Opta-Init/scripts/**"
      - "1-Apps/optalocal/1O-Opta-Init/package.json"
      - "1-Apps/optalocal/1O-Opta-Init/package-lock.json"
      - "1-Apps/optalocal/1O-Opta-Init/vercel.json"
      - ".github/workflows/opta-init-release-manifest-checks.yml"
  push:
    branches:
      - main
    paths:
      - "1-Apps/optalocal/1O-Opta-Init/channels/**"
      - "1-Apps/optalocal/1O-Opta-Init/public/desktop/**"
      - "1-Apps/optalocal/1O-Opta-Init/public/desktop-updates/**"
      - "1-Apps/optalocal/1O-Opta-Init/scripts/**"
      - "1-Apps/optalocal/1O-Opta-Init/package.json"
      - "1-Apps/optalocal/1O-Opta-Init/package-lock.json"
      - "1-Apps/optalocal/1O-Opta-Init/vercel.json"
      - ".github/workflows/opta-init-release-manifest-checks.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  release-manifest-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 1-Apps/optalocal/1O-Opta-Init
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "1-Apps/optalocal/1O-Opta-Init/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Validate full release contract
        run: npm run validate:release-contract

      - name: Validate strict release contract (advisory)
        continue-on-error: true
        run: npm run validate:release-contract:strict

      - name: Generate promotion status report
        run: npm run report:promotion-status -- --output "$RUNNER_TEMP/opta-init-promotion-status.md"

      - name: Upload promotion status report
        uses: actions/upload-artifact@v4
        with:
          name: opta-init-promotion-status
          path: ${{ runner.temp }}/opta-init-promotion-status.md
          if-no-files-found: error
          retention-days: 14

      - name: Detect stable feed changes
        id: stable_changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail

          BASE="$BASE_SHA"
          HEAD="$HEAD_SHA"

          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi

          if [ -z "$BASE" ] || [ -z "$HEAD" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$BASE" "$HEAD" | grep -Eq '^1-Apps/optalocal/1O-Opta-Init/channels/(stable\.json|manager-updates/stable\.json)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce stable promotion gate
        if: steps.stable_changes.outputs.changed == 'true'
        run: npm run validate:stable-promotion

      - name: Verify generated manifests are in sync
        run: |
          npm run sync:desktop-manifests
          npm run sync:manager-updates
          npm run sync:vercel-redirects
          if ! git diff --quiet -- \
            public/desktop/manifest-stable.json \
            public/desktop/manifest-beta.json \
            public/desktop/schema/release-manifest.v1.schema.json \
            public/desktop-updates/stable.json \
            public/desktop-updates/beta.json \
            public/desktop-updates/schema/manager-updater-metadata.v1.schema.json \
            vercel.json; then
            echo "Generated manifests are out of sync. Run:"
            echo "  npm run sync:desktop-manifests && npm run sync:manager-updates && npm run sync:vercel-redirects"
            git --no-pager diff -- \
              public/desktop/manifest-stable.json \
              public/desktop/manifest-beta.json \
              public/desktop/schema/release-manifest.v1.schema.json \
              public/desktop-updates/stable.json \
              public/desktop-updates/beta.json \
              public/desktop-updates/schema/manager-updater-metadata.v1.schema.json \
              vercel.json
            exit 1
          fi
