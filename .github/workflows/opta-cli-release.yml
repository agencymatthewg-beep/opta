name: Opta CLI Release

on:
  push:
    tags:
      - 'opta-cli-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 1-Apps/optalocal/1D-Opta-CLI-TS
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Release quality gate
        run: npm run typecheck && npm run build && npm run check-dist


  publish-npm:
    runs-on: ubuntu-latest
    environment: npm
    needs: [release-checks]
    defaults:
      run:
        working-directory: 1-Apps/optalocal/1D-Opta-CLI-TS
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Publish to npm
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *"-alpha"* ]]; then
            echo "Publishing alpha version $VERSION with dist-tag alpha"
            npm publish --tag alpha --access public
          else
            echo "Publishing stable version $VERSION with dist-tag latest"
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-github-asset:
    runs-on: ubuntu-latest
    needs: [release-checks]
    outputs:
      version: ${{ steps.release-meta.outputs.version }}
      published_at: ${{ steps.release-meta.outputs.published_at }}
    defaults:
      run:
        working-directory: 1-Apps/optalocal/1D-Opta-CLI-TS
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build npm package tarball
        run: |
          set -euo pipefail
          PACK_FILE="$(npm pack --silent | tail -n1)"
          mv "$PACK_FILE" opta-cli-npm.tgz
          ls -lh opta-cli-npm.tgz

      - name: Capture release metadata
        id: release-meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "published_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: 1-Apps/optalocal/1D-Opta-CLI-TS/opta-cli-npm.tgz

  sync-opta-init-manifest:
    if: startsWith(github.ref, 'refs/tags/opta-cli-v')
    needs: [publish-github-asset]
    uses: ./.github/workflows/opta-init-component-manifest-sync.yml
    with:
      channel: ${{ contains(needs.publish-github-asset.outputs.version, '-') && 'beta' || 'stable' }}
      component_id: opta-cli
      metadata_ref: main
      strict_require_artifacts: true
      strict_require_signatures: false
      payload_json: |
        {
          "publishedAt": "${{ needs.publish-github-asset.outputs.published_at }}",
          "release": {
            "notesUrl": "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          },
          "component": {
            "id": "opta-cli",
            "version": "${{ needs.publish-github-asset.outputs.version }}",
            "artifacts": {
              "macos": [
                {
                  "platform": "macos",
                  "arch": "universal",
                  "packageType": "tar.gz",
                  "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/opta-cli-npm.tgz"
                }
              ],
              "windows": [
                {
                  "platform": "windows",
                  "arch": "x64",
                  "packageType": "tar.gz",
                  "url": "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/opta-cli-npm.tgz"
                }
              ]
            }
          }
        }
    secrets: inherit
