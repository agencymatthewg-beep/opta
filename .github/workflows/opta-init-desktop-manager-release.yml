name: Opta Init Desktop Manager Release

on:
  push:
    tags:
      - "opta-init-manager-stable-v*"
      - "opta-init-manager-beta-v*"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: beta
        type: choice
        options:
          - beta
          - stable
      version:
        description: "Manager version (semver). Leave blank to use desktop-manager version."
        required: false
        type: string
      notes_url:
        description: "Release notes URL. Leave blank to use GitHub release page."
        required: false
        type: string
      publish_metadata:
        description: "Commit generated updater metadata to repo"
        required: true
        default: true
        type: boolean
      strict_link_check:
        description: "Run strict manager updater URL validation"
        required: true
        default: true
        type: boolean
      dry_run:
        description: "Build and validate only (skip metadata push)"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: opta-init-manager-release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  APP_DIR: 1-Apps/optalocal/1O-Opta-Init
  MANAGER_DIR: 1-Apps/optalocal/1O-Opta-Init/desktop-manager

jobs:
  prepare-release:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.resolve.outputs.channel }}
      version: ${{ steps.resolve.outputs.version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      notes_url: ${{ steps.resolve.outputs.notes_url }}
      published_at: ${{ steps.resolve.outputs.published_at }}
      publish_metadata: ${{ steps.resolve.outputs.publish_metadata }}
      strict_link_check: ${{ steps.resolve.outputs.strict_link_check }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      metadata_ref: ${{ steps.resolve.outputs.metadata_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve channel/version/tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel || '' }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          INPUT_NOTES_URL: ${{ github.event.inputs.notes_url || '' }}
          INPUT_PUBLISH_METADATA: ${{ github.event.inputs.publish_metadata || '' }}
          INPUT_STRICT_LINK_CHECK: ${{ github.event.inputs.strict_link_check || '' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || '' }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const workspace = process.cwd();
          const appDir = path.join(workspace, '1-Apps/optalocal/1O-Opta-Init');
          const managerDir = path.join(appDir, 'desktop-manager');
          const cargoTomlPath = path.join(managerDir, 'src-tauri/Cargo.toml');
          const tauriConfPath = path.join(managerDir, 'src-tauri/tauri.conf.json');
          const packageJsonPath = path.join(managerDir, 'package.json');

          const eventName = process.env.EVENT_NAME;
          const refName = process.env.REF_NAME;
          const repo = process.env.REPOSITORY;

          if (eventName === 'workflow_dispatch' && refName !== 'main') {
            fail(`workflow_dispatch releases must run from main (current ref: ${refName}).`);
          }

          const inputChannel = (process.env.INPUT_CHANNEL || '').trim();
          const inputVersion = (process.env.INPUT_VERSION || '').trim();
          const inputNotesUrl = (process.env.INPUT_NOTES_URL || '').trim();

          const semverRegex = /^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/;

          function parseBool(rawValue, fallback) {
            if (!rawValue) return fallback;
            const normalized = String(rawValue).trim().toLowerCase();
            if (normalized === 'true') return true;
            if (normalized === 'false') return false;
            return fallback;
          }

          function fail(message) {
            console.error(message);
            process.exit(1);
          }

          const managerPackage = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          const managerTauri = JSON.parse(fs.readFileSync(tauriConfPath, 'utf8'));
          const cargoToml = fs.readFileSync(cargoTomlPath, 'utf8');
          const cargoVersionMatch = cargoToml.match(/^version\s*=\s*"([^"]+)"/m);
          if (!cargoVersionMatch) {
            fail('Unable to parse version from desktop-manager/src-tauri/Cargo.toml');
          }

          const declaredVersions = [
            managerPackage.version,
            managerTauri.version,
            cargoVersionMatch[1],
          ];
          const distinctVersions = [...new Set(declaredVersions)];
          if (distinctVersions.length !== 1) {
            fail(`Desktop manager version mismatch: package.json=${declaredVersions[0]}, tauri.conf.json=${declaredVersions[1]}, Cargo.toml=${declaredVersions[2]}`);
          }

          const declaredVersion = distinctVersions[0];
          if (!semverRegex.test(declaredVersion)) {
            fail(`Desktop manager version '${declaredVersion}' is not valid semver`);
          }

          let channel;
          let version;
          let releaseTag;
          if (eventName === 'push') {
            const stableMatch = refName.match(/^opta-init-manager-stable-v(.+)$/);
            const betaMatch = refName.match(/^opta-init-manager-beta-v(.+)$/);
            if (stableMatch) {
              channel = 'stable';
              version = stableMatch[1];
              releaseTag = refName;
            } else if (betaMatch) {
              channel = 'beta';
              version = betaMatch[1];
              releaseTag = refName;
            } else {
              fail(`Unsupported tag '${refName}'. Expected opta-init-manager-stable-v* or opta-init-manager-beta-v*`);
            }
          } else {
            channel = inputChannel || 'beta';
            if (!['stable', 'beta'].includes(channel)) {
              fail(`Invalid channel '${channel}'. Must be stable or beta.`);
            }
            version = inputVersion || declaredVersion;
            releaseTag = `opta-init-manager-${channel}-v${version}`;
          }

          if (!semverRegex.test(version)) {
            fail(`Version '${version}' is not valid semver`);
          }

          if (version !== declaredVersion) {
            fail(`Resolved release version '${version}' does not match desktop manager declared version '${declaredVersion}'.`);
          }

          const publishedAt = new Date().toISOString().replace(/\.\d{3}Z$/, 'Z');
          const notesUrl = inputNotesUrl || `https://github.com/${repo}/releases/tag/${releaseTag}`;

          if (!notesUrl.startsWith('https://')) {
            fail(`Notes URL must be https: '${notesUrl}'`);
          }

          const publishMetadata = eventName === 'push'
            ? true
            : parseBool(process.env.INPUT_PUBLISH_METADATA, true);
          const strictLinkCheck = eventName === 'push'
            ? true
            : parseBool(process.env.INPUT_STRICT_LINK_CHECK, true);
          const dryRun = eventName === 'push'
            ? false
            : parseBool(process.env.INPUT_DRY_RUN, false);

          const metadataRef = eventName === 'push' ? 'main' : refName;

          const outputs = {
            channel,
            version,
            release_tag: releaseTag,
            notes_url: notesUrl,
            published_at: publishedAt,
            publish_metadata: String(publishMetadata),
            strict_link_check: String(strictLinkCheck),
            dry_run: String(dryRun),
            metadata_ref: metadataRef,
          };

          const outputPath = process.env.GITHUB_OUTPUT;
          const lines = Object.entries(outputs).map(([key, value]) => `${key}=${value}`);
          fs.appendFileSync(outputPath, `${lines.join('\n')}\n`);

          console.log(`Resolved release: channel=${channel}, version=${version}, tag=${releaseTag}, metadata_ref=${metadataRef}`);
          NODE

  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    needs: prepare-release
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install Opta Init dependencies
        run: npm ci

      - name: Validate full release contract
        run: npm run validate:release-contract

      - name: Install desktop-manager dependencies
        working-directory: ${{ env.MANAGER_DIR }}
        run: npm ci

      - name: Desktop-manager typecheck
        working-directory: ${{ env.MANAGER_DIR }}
        run: npm run typecheck

      - name: Desktop-manager frontend build
        working-directory: ${{ env.MANAGER_DIR }}
        run: npm run build

  build-macos:
    name: Build macOS updater bundles
    runs-on: ${{ matrix.runner }}
    needs: [prepare-release, quality-gate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            platform_key: darwin-aarch64
            updater_name: Opta-Init-Manager_aarch64.app.tar.gz
            dmg_name: Opta-Init-Manager_aarch64.dmg
          - runner: macos-13
            target: x86_64-apple-darwin
            platform_key: darwin-x86_64
            updater_name: Opta-Init-Manager_x64.app.tar.gz
            dmg_name: Opta-Init-Manager_x64.dmg
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.MANAGER_DIR }}/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "${{ env.MANAGER_DIR }}/src-tauri -> target"

      - name: Require Tauri updater signing secrets
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ] || [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY or TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
            exit 1
          fi

      - name: Require macOS signing secrets for tagged releases
        if: github.event_name == 'push'
        run: |
          if [ -z "${APPLE_CERTIFICATE}" ] || [ -z "${APPLE_CERTIFICATE_PASSWORD}" ] || [ -z "${APPLE_SIGNING_IDENTITY}" ]; then
            echo "Tagged releases require APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, and APPLE_SIGNING_IDENTITY."
            exit 1
          fi

      - name: Import Apple Developer ID certificate
        if: env.APPLE_CERTIFICATE != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install desktop-manager dependencies
        working-directory: ${{ env.MANAGER_DIR }}
        run: npm ci

      - name: Build desktop-manager with Tauri (${{ matrix.target }})
        working-directory: ${{ env.MANAGER_DIR }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Collect updater artifact (${{ matrix.platform_key }})
        shell: bash
        run: |
          set -euo pipefail
          bundle_dir="${GITHUB_WORKSPACE}/${{ env.MANAGER_DIR }}/src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          updater_file="$(find "$bundle_dir" -maxdepth 1 -type f -name '*.app.tar.gz' | head -n 1)"
          if [ -z "$updater_file" ]; then
            echo "No macOS updater artifact (*.app.tar.gz) found in $bundle_dir"
            find "$bundle_dir" -maxdepth 2 -type f || true
            exit 1
          fi
          sig_file="${updater_file}.sig"
          if [ ! -f "$sig_file" ]; then
            echo "Updater signature file missing: $sig_file"
            exit 1
          fi
          dist_dir="${RUNNER_TEMP}/dist"
          mkdir -p "$dist_dir"
          cp "$updater_file" "$dist_dir/${{ matrix.updater_name }}"
          cp "$sig_file" "$dist_dir/${{ matrix.updater_name }}.sig"

      - name: Collect DMG installer artifact (${{ matrix.platform_key }})
        shell: bash
        run: |
          set -euo pipefail
          dmg_dir="${GITHUB_WORKSPACE}/${{ env.MANAGER_DIR }}/src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
          dmg_file="$(find "$dmg_dir" -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          if [ -z "$dmg_file" ]; then
            echo "No DMG installer (*.dmg) found in $dmg_dir"
            find "$dmg_dir" -maxdepth 2 -type f || true
            exit 1
          fi

          dist_dir="${RUNNER_TEMP}/dist"
          mkdir -p "$dist_dir"
          cp "$dmg_file" "$dist_dir/${{ matrix.dmg_name }}"

      - name: Verify DMG notarization and Gatekeeper acceptance (${{ matrix.platform_key }})
        shell: bash
        run: |
          set -euo pipefail
          dmg_file="${RUNNER_TEMP}/dist/${{ matrix.dmg_name }}"
          if [ ! -f "$dmg_file" ]; then
            echo "Expected DMG not found: $dmg_file"
            exit 1
          fi

          spctl -a -vv -t open "$dmg_file"
          xcrun stapler validate "$dmg_file"

      - name: Upload updater artifact (${{ matrix.platform_key }})
        uses: actions/upload-artifact@v4
        with:
          name: manager-updater-${{ matrix.platform_key }}
          path: |
            ${{ runner.temp }}/dist/${{ matrix.updater_name }}
            ${{ runner.temp }}/dist/${{ matrix.updater_name }}.sig
          if-no-files-found: error
          retention-days: 30

      - name: Upload DMG artifact (${{ matrix.platform_key }})
        uses: actions/upload-artifact@v4
        with:
          name: manager-dmg-${{ matrix.platform_key }}
          path: |
            ${{ runner.temp }}/dist/${{ matrix.dmg_name }}
          if-no-files-found: error
          retention-days: 30

  build-windows:
    name: Build Windows updater bundle
    runs-on: windows-latest
    needs: [prepare-release, quality-gate]
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.MANAGER_DIR }}/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "${{ env.MANAGER_DIR }}/src-tauri -> target"

      - name: Require Tauri updater signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY) -or [string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            Write-Error "Missing TAURI_SIGNING_PRIVATE_KEY or TAURI_SIGNING_PRIVATE_KEY_PASSWORD."
            exit 1
          }

      - name: Require Windows code signing secrets for tagged releases
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Error "Tagged releases require WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD."
            exit 1
          }

      - name: Configure Authenticode signing
        if: env.WINDOWS_CERTIFICATE != '' && env.WINDOWS_CERTIFICATE_PASSWORD != ''
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "opta-init-manager.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $securePwd = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePwd | Out-Null
          $thumbprint = (Get-PfxCertificate -FilePath $pfxPath -Password $securePwd).Thumbprint
          Remove-Item $pfxPath -Force

          $confPath = Join-Path $env:GITHUB_WORKSPACE "${{ env.MANAGER_DIR }}\src-tauri\tauri.conf.json"
          $conf = Get-Content $confPath -Raw | ConvertFrom-Json
          if (-not $conf.bundle.windows) {
            $conf.bundle | Add-Member -NotePropertyName windows -NotePropertyValue ([PSCustomObject]@{})
          }
          $conf.bundle.windows.certificateThumbprint = $thumbprint
          $conf.bundle.windows.timestampUrl = "http://timestamp.digicert.com"
          $conf | ConvertTo-Json -Depth 20 | Set-Content $confPath
          Write-Host "Windows code signing configured."

      - name: Install desktop-manager dependencies
        working-directory: ${{ env.MANAGER_DIR }}
        run: npm ci

      - name: Build desktop-manager with Tauri (Windows)
        working-directory: ${{ env.MANAGER_DIR }}
        run: npm run tauri build

      - name: Collect updater artifact (windows-x86_64)
        shell: pwsh
        run: |
          $bundleDir = Join-Path $env:GITHUB_WORKSPACE "${{ env.MANAGER_DIR }}\src-tauri\target\release\bundle\nsis"
          if (-not (Test-Path $bundleDir)) {
            Write-Error "NSIS bundle directory not found: $bundleDir"
            exit 1
          }

          $updaterFile = Get-ChildItem -Path $bundleDir -File -Filter *.nsis.zip | Select-Object -First 1
          if (-not $updaterFile) {
            Write-Error "No Windows updater artifact (*.nsis.zip) found in $bundleDir"
            Get-ChildItem -Path $bundleDir -File | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          $sigPath = "$($updaterFile.FullName).sig"
          if (-not (Test-Path $sigPath)) {
            Write-Error "Updater signature file missing: $sigPath"
            exit 1
          }

          $distDir = Join-Path $env:RUNNER_TEMP "dist"
          New-Item -ItemType Directory -Path $distDir -Force | Out-Null

          $targetArtifact = Join-Path $distDir "Opta-Init-Manager_x64-setup.nsis.zip"
          $targetSignature = Join-Path $distDir "Opta-Init-Manager_x64-setup.nsis.zip.sig"
          Copy-Item $updaterFile.FullName $targetArtifact -Force
          Copy-Item $sigPath $targetSignature -Force

      - name: Upload updater artifact (windows-x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: manager-updater-windows-x86_64
          path: |
            ${{ runner.temp }}/dist/Opta-Init-Manager_x64-setup.nsis.zip
            ${{ runner.temp }}/dist/Opta-Init-Manager_x64-setup.nsis.zip.sig
          if-no-files-found: error
          retention-days: 30

  publish-assets:
    name: Publish manager updater assets
    runs-on: ubuntu-latest
    needs: [prepare-release, build-macos, build-windows]
    outputs:
      asset_base_url: ${{ steps.asset-base.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release tag exists (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Tag ${RELEASE_TAG} already exists."
            exit 0
          fi
          git tag "${RELEASE_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: manager-updater-darwin-aarch64
          path: dist

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: manager-updater-darwin-x86_64
          path: dist

      - name: Download macOS arm64 DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: manager-dmg-darwin-aarch64
          path: dist

      - name: Download macOS x64 DMG artifact
        uses: actions/download-artifact@v4
        with:
          name: manager-dmg-darwin-x86_64
          path: dist

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: manager-updater-windows-x86_64
          path: dist

      - name: Create canonical DMG alias for public download
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f dist/Opta-Init-Manager_aarch64.dmg ]; then
            echo "Expected dist/Opta-Init-Manager_aarch64.dmg not found"
            ls -la dist || true
            exit 1
          fi

          cp dist/Opta-Init-Manager_aarch64.dmg dist/opta-init-mac.dmg

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.release_tag }}
          name: Opta Init Manager ${{ needs.prepare-release.outputs.channel }} v${{ needs.prepare-release.outputs.version }}
          prerelease: ${{ needs.prepare-release.outputs.channel != 'stable' }}
          files: |
            dist/Opta-Init-Manager_aarch64.app.tar.gz
            dist/Opta-Init-Manager_aarch64.app.tar.gz.sig
            dist/Opta-Init-Manager_x64.app.tar.gz
            dist/Opta-Init-Manager_x64.app.tar.gz.sig
            dist/opta-init-mac.dmg
            dist/Opta-Init-Manager_aarch64.dmg
            dist/Opta-Init-Manager_x64.dmg
            dist/Opta-Init-Manager_x64-setup.nsis.zip
            dist/Opta-Init-Manager_x64-setup.nsis.zip.sig
          fail_on_unmatched_files: true

      - name: Compute asset base URL
        id: asset-base
        run: |
          echo "url=https://init.optalocal.com/desktop-updates/manager/${{ needs.prepare-release.outputs.channel }}/${{ needs.prepare-release.outputs.version }}" >> "$GITHUB_OUTPUT"

  publish-metadata:
    name: Generate and publish updater metadata
    runs-on: ubuntu-latest
    needs: [prepare-release, publish-assets]
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - name: Checkout metadata branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.metadata_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install Opta Init dependencies
        run: npm ci

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: manager-updater-darwin-aarch64
          path: ${{ env.APP_DIR }}/dist

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: manager-updater-darwin-x86_64
          path: ${{ env.APP_DIR }}/dist

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: manager-updater-windows-x86_64
          path: ${{ env.APP_DIR }}/dist

      - name: Generate channel metadata
        env:
          CHANNEL: ${{ needs.prepare-release.outputs.channel }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          NOTES_URL: ${{ needs.prepare-release.outputs.notes_url }}
          PUBLISHED_AT: ${{ needs.prepare-release.outputs.published_at }}
          ASSET_BASE_URL: ${{ needs.publish-assets.outputs.asset_base_url }}
        run: |
          npm run generate:manager-update-metadata -- \
            --channel "$CHANNEL" \
            --version "$VERSION" \
            --notes "$NOTES_URL" \
            --published-at "$PUBLISHED_AT" \
            --artifact-base-url "$ASSET_BASE_URL" \
            --darwin-aarch64-artifact Opta-Init-Manager_aarch64.app.tar.gz \
            --darwin-aarch64-signature-file dist/Opta-Init-Manager_aarch64.app.tar.gz.sig \
            --darwin-x86_64-artifact Opta-Init-Manager_x64.app.tar.gz \
            --darwin-x86_64-signature-file dist/Opta-Init-Manager_x64.app.tar.gz.sig \
            --windows-x86_64-artifact Opta-Init-Manager_x64-setup.nsis.zip \
            --windows-x86_64-signature-file dist/Opta-Init-Manager_x64-setup.nsis.zip.sig \
            --output "channels/manager-updates/${CHANNEL}.json" \
            --validate

      - name: Sync public updater feeds
        run: npm run sync:manager-updates

      - name: Validate strict manager update links
        if: needs.prepare-release.outputs.strict_link_check == 'true'
        env:
          CHANNEL: ${{ needs.prepare-release.outputs.channel }}
        run: npm run validate:manager-update-links -- --strict "channels/manager-updates/${CHANNEL}.json"

      - name: Commit and push metadata
        if: needs.prepare-release.outputs.publish_metadata == 'true' && needs.prepare-release.outputs.dry_run != 'true'
        env:
          CHANNEL: ${{ needs.prepare-release.outputs.channel }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          METADATA_REF: ${{ needs.prepare-release.outputs.metadata_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "channels/manager-updates/${CHANNEL}.json"
          git add "public/desktop-updates/${CHANNEL}.json"
          git add "public/desktop-updates/schema/manager-updater-metadata.v1.schema.json"

          if git diff --cached --quiet; then
            echo "No metadata changes to commit."
            exit 0
          fi

          git commit -m "chore(opta-init): publish manager metadata ${CHANNEL} v${VERSION} (${RELEASE_TAG})"
          git push origin "HEAD:${METADATA_REF}"

      - name: Upload metadata snapshot
        uses: actions/upload-artifact@v4
        with:
          name: manager-update-metadata-${{ needs.prepare-release.outputs.channel }}
          path: |
            ${{ env.APP_DIR }}/channels/manager-updates/${{ needs.prepare-release.outputs.channel }}.json
            ${{ env.APP_DIR }}/public/desktop-updates/${{ needs.prepare-release.outputs.channel }}.json
          if-no-files-found: error
          retention-days: 30

  release-summary:
    name: Release summary
    runs-on: ubuntu-latest
    needs: [prepare-release, publish-assets, publish-metadata]
    if: always()
    steps:
      - name: Publish summary
        env:
          CHANNEL: ${{ needs.prepare-release.outputs.channel }}
          VERSION: ${{ needs.prepare-release.outputs.version }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          NOTES_URL: ${{ needs.prepare-release.outputs.notes_url }}
          PUBLISHED_AT: ${{ needs.prepare-release.outputs.published_at }}
          ASSET_BASE_URL: ${{ needs.publish-assets.outputs.asset_base_url }}
          PUBLISH_METADATA_RESULT: ${{ needs.publish-metadata.result }}
        run: |
          {
            echo "## Opta Init Desktop Manager Release"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Channel | ${CHANNEL} |"
            echo "| Version | ${VERSION} |"
            echo "| Tag | ${RELEASE_TAG} |"
            echo "| Published at (UTC) | ${PUBLISHED_AT} |"
            echo "| Notes URL | ${NOTES_URL} |"
            echo "| Asset base URL | ${ASSET_BASE_URL} |"
            echo "| Metadata job | ${PUBLISH_METADATA_RESULT} |"
            echo ""
            echo "Updater feed endpoints:"
            echo "- https://init.optalocal.com/desktop-updates/stable.json"
            echo "- https://init.optalocal.com/desktop-updates/beta.json"
          } >> "$GITHUB_STEP_SUMMARY"
