name: Sync Feature Registry

on:
  push:
    branches: [main]
    paths:
      - "1-Apps/optalocal/optalocal-updates/**"
      - ".github/workflows/sync-feature-registry.yml"
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    name: Update Status feature files from optalocal-updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install js-yaml
        run: npm install js-yaml --no-save

      - name: Run feature registry sync script
        run: node 1-Apps/optalocal/scripts/sync-feature-registry.mjs
        working-directory: ${{ github.workspace }}

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit updated feature files
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 1-Apps/optalocal/1S-Opta-Status/docs/features/
          git commit -m "ci: Auto-sync feature registry from optalocal-updates"
          git push

      - name: Fix git config for checkout cleanup
        if: always()
        run: |
          git config --local --remove-section submodule._worktrees/recent-branch-resolution || true
          rm -rf .git/modules/_worktrees/recent-branch-resolution || true
