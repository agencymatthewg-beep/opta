<svg width="210" height="210" viewBox="0 0 210 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Outer ring violet glow -->
    <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Bloom for data streams & core -->
    <filter id="bloom" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Inner void fill -->
    <radialGradient id="voidFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#100e18"/>
      <stop offset="60%"  stop-color="#0c0a14"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <!-- Ring highlight gradient -->
    <linearGradient id="ringHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c084fc" stop-opacity="0.9"/>
      <stop offset="25%"  stop-color="#a855f7" stop-opacity="0.7"/>
      <stop offset="55%"  stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Orbit ellipse gradient -->
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c084fc" stop-opacity="0.8"/>
      <stop offset="40%"  stop-color="#a855f7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Centre bloom gradient -->
    <radialGradient id="centreBloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f5d0fe" stop-opacity="1"/>
      <stop offset="30%"  stop-color="#e879f9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <!-- Outer dim glow -->
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="70%"  stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="85%"  stop-color="#a855f7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <!-- Singularity fog for daemon -->
    <radialGradient id="singFog" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="60%"  stop-color="#a855f7" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <!-- Gradient for binary text paths -->
    <path id="textPathOut" d="M 105, 15 A 90,90 0 1,1 104.9, 15"/>
    <path id="textPathIn"  d="M 105, 30 A 75,75 0 1,1 104.9, 30"/>
    <!-- Data stream line gradient -->
    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#a855f7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- === Outer atmosphere === -->
  <circle cx="105" cy="105" r="100" fill="url(#outerGlow)"/>
  <!-- Secondary singularity fog for the daemon core -->
  <circle cx="105" cy="105" r="85" fill="url(#singFog)"/>

  <!-- === Deep void fill === -->
  <circle cx="105" cy="105" r="88" fill="url(#voidFill)"/>

  <!-- === Outer ring layers === -->
  <circle cx="105" cy="105" r="96" stroke="#a855f7" stroke-width="6" stroke-opacity="0.06" fill="none"/>
  <circle cx="105" cy="105" r="93" stroke="#a855f7" stroke-width="3" stroke-opacity="0.10" fill="none"/>
  <circle cx="105" cy="105" r="90" stroke="url(#ringHighlight)" stroke-width="1.6" fill="none" filter="url(#ringGlow)"/>
  <circle cx="105" cy="105" r="87" stroke="#a855f7" stroke-width="0.6" stroke-opacity="0.12" fill="none"/>

  <!-- === Binary Matrix Atmosphere — outer ring, JetBrains Mono 0/1 pattern === -->
  <g style="font-family: 'JetBrains Mono', monospace; font-size: 6px;">
    <text fill="#a855f7" opacity="0.35">
      <textPath href="#textPathOut" startOffset="0%">0101100101100110101001101001011010011010010110</textPath>
    </text>
    <text fill="#a855f7" opacity="0.25" style="font-size: 5px;">
      <textPath href="#textPathIn"  startOffset="20%">1011010010110100101101001011010010110100</textPath>
    </text>
  </g>

  <!-- === Canonical Orbit Ellipse === -->
  <ellipse cx="105" cy="105" rx="52" ry="23"
    stroke="url(#orbitGrad)" stroke-width="1.4" fill="none"
    transform="rotate(-30 105 105)" filter="url(#ringGlow)"/>
  <ellipse cx="105" cy="105" rx="52" ry="23"
    stroke="#c084fc" stroke-width="0.5" stroke-opacity="0.3" fill="none"
    transform="rotate(-30 105 105)"/>

  <!-- Orbit node dots -->
  <g transform="rotate(-30 105 105)">
    <circle cx="53"  cy="105" r="2.2" fill="#c084fc" fill-opacity="0.7"/>
    <circle cx="53"  cy="105" r="4"   fill="#a855f7" fill-opacity="0.2"/>
    <circle cx="157" cy="105" r="2.2" fill="#a855f7" fill-opacity="0.5"/>
    <circle cx="157" cy="105" r="3.5" fill="#a855f7" fill-opacity="0.12"/>
  </g>

  <!-- === Daemon Glyph: Tri-Node Convergence === -->
  <g transform="translate(105, 105)">

    <!-- Radial data streams – 3 clients: CLI (top), LMX (bottom-left), Code (bottom-right) -->
    <!-- CLI Stream -->
    <line x1="0" y1="-20" x2="0" y2="-58" stroke="url(#streamGrad)" stroke-width="1.5" stroke-dasharray="3 5"/>
    <!-- LMX Stream -->
    <g transform="rotate(120)">
      <line x1="0" y1="-20" x2="0" y2="-58" stroke="url(#streamGrad)" stroke-width="1.5" stroke-dasharray="3 5"/>
    </g>
    <!-- Code Stream -->
    <g transform="rotate(240)">
      <line x1="0" y1="-20" x2="0" y2="-58" stroke="url(#streamGrad)" stroke-width="1.5" stroke-dasharray="3 5"/>
    </g>

    <!-- Node ingress dots (3 clients) -->
    <!-- CLI -->
    <circle cx="0"    cy="-58" r="2.5" fill="#ffffff" fill-opacity="0.9" filter="url(#bloom)"/>
    <!-- LMX (rotate 120 → ~50.2, 33.0) -->
    <circle cx="50.2"  cy="29.0" r="2.5" fill="#ffffff" fill-opacity="0.9" filter="url(#bloom)"/>
    <!-- Code (rotate 240 → ~-50.2, 33.0) -->
    <circle cx="-50.2" cy="29.0" r="2.5" fill="#ffffff" fill-opacity="0.9" filter="url(#bloom)"/>

    <!-- Central Reactor Ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="2 4" stroke-opacity="0.7"/>
    <circle cx="0" cy="0" r="16" fill="#a855f7" fill-opacity="0.08"/>

    <!-- Inner Tri Mark (process routing symbol) -->
    <path d="M0 -9.5 L8.2 4.75 L-8.2 4.75 Z" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linejoin="round" filter="url(#bloom)"/>

    <!-- Core focal node -->
    <circle cx="0" cy="0" r="2.8" fill="url(#centreBloom)"/>
    <circle cx="0" cy="0" r="3.2" fill="#f5d0fe" fill-opacity="0.9"/>
    <circle cx="-1.2" cy="-1.2" r="1.1"  fill="#ffffff" fill-opacity="0.95"/>
  </g>

  <!-- === Centre global bloom overlay === -->
  <circle cx="105" cy="105" r="20" fill="url(#centreBloom)" fill-opacity="0.14"/>
</svg>
