name: Opta Code - Linux Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "1-Apps/optalocal/1P-Opta-Code-Universal/**"
      - ".github/workflows/opta-code-linux-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "1-Apps/optalocal/1P-Opta-Code-Universal/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: 1-Apps/optalocal/1P-Opta-Code-Universal

jobs:
  unit-tests:
    name: Unit tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install CLI workspace dependencies (types only)
        working-directory: 1-Apps/optalocal/1D-Opta-CLI-TS
        run: npm install --ignore-scripts
      - name: Install daemon-client dependencies (types only)
        working-directory: 1-Apps/optalocal/1D-Opta-CLI-TS/packages/daemon-client
        run: npm install --ignore-scripts
      - name: Install desktop dependencies
        run: npm install
      - name: Type-check
        run: npm run typecheck
      - name: Run vitest
        run: npm run test:run

  linux-build:
    name: Linux bundle (Tauri v2)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "1-Apps/optalocal/1P-Opta-Code-Universal/src-tauri -> target"
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install CLI workspace dependencies (types only)
        working-directory: 1-Apps/optalocal/1D-Opta-CLI-TS
        run: npm install --ignore-scripts
      - name: Install daemon-client dependencies (types only)
        working-directory: 1-Apps/optalocal/1D-Opta-CLI-TS/packages/daemon-client
        run: npm install --ignore-scripts
      - name: Install desktop dependencies
        run: npm install
      - name: Build Vite frontend
        run: npm run build
      - name: Build Tauri app (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: 1-Apps/optalocal/1P-Opta-Code-Universal
          tauriScript: npx tauri
          args: --target x86_64-unknown-linux-gnu
      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: opta-code-linux-bundle
          path: |
            1-Apps/optalocal/1P-Opta-Code-Universal/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
            1-Apps/optalocal/1P-Opta-Code-Universal/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          if-no-files-found: error
          retention-days: 30

  linux-smoke:
    name: Linux smoke test
    runs-on: ubuntu-latest
    needs: linux-build
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')))
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: opta-code-linux-bundle
          path: dist-artifacts
      - name: Verify Linux artifacts
        working-directory: .
        run: |
          appimage_count=$(find dist-artifacts -name "*.AppImage" | wc -l | tr -d ' ')
          deb_count=$(find dist-artifacts -name "*.deb" | wc -l | tr -d ' ')
          if [ "$appimage_count" -eq 0 ] && [ "$deb_count" -eq 0 ]; then
            echo "ERROR: No Linux bundle artifacts found"
            find dist-artifacts -type f
            exit 1
          fi
          {
            echo "AppImage artifacts: $appimage_count"
            echo "Deb artifacts: $deb_count"
            echo "---"
            find dist-artifacts -type f
          } | tee dist-artifacts/linux-smoke.log
      - name: Upload Linux smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opta-code-linux-smoke-logs
          path: dist-artifacts/linux-smoke.log
          if-no-files-found: ignore

  linux-release-readiness:
    name: Linux release readiness summary
    runs-on: ubuntu-latest
    needs: [unit-tests, linux-build, linux-smoke]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Publish readiness summary
        env:
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          BUILD_RESULT: ${{ needs.linux-build.result }}
          SMOKE_RESULT: ${{ needs.linux-smoke.result }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref }}
        run: |
          {
            echo "## Linux Release Readiness"
            echo ""
            echo "| Gate | Result |"
            echo "| --- | --- |"
            echo "| unit-tests | ${UNIT_RESULT} |"
            echo "| linux-build | ${BUILD_RESULT} |"
            echo "| linux-smoke | ${SMOKE_RESULT} |"
            echo ""
            echo "Event: ${EVENT_NAME}"
            echo "Ref: ${REF_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${UNIT_RESULT}" != "success" ]; then
            echo "unit-tests gate failed (${UNIT_RESULT})"
            exit 1
          fi

          if [ "${BUILD_RESULT}" != "success" ]; then
            echo "linux-build gate failed (${BUILD_RESULT})"
            exit 1
          fi

          if [ "${SMOKE_RESULT}" != "success" ]; then
            echo "linux-smoke gate failed (${SMOKE_RESULT})"
            exit 1
          fi
