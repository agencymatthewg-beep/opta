<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opta Code Logo - Neon Structure</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap");
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #09090b; font-family: "JetBrains Mono", monospace;}
        .canvas { position: relative; width: 400px; height: 400px; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(168, 85, 247, 0.05) 0%, transparent 70%); }
        
        .grid {
            position: absolute; inset: 0;
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
        }

        .hexagon {
            position: relative;
            width: 160px; height: 184.75px;
            background: rgba(12, 12, 18, 0.8);
            border-left: 2px solid #a855f7;
            border-right: 2px solid #a855f7;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.2);
            display: flex; justify-content: center; align-items: center;
        }

        .hexagon::before, .hexagon::after {
            content: '';
            position: absolute; z-index: -1;
            width: 100%; height: 100%; box-sizing: border-box;
            border-left: 2px solid #a855f7; border-right: 2px solid #a855f7;
        }
        .hexagon::before { transform: rotate(60deg); }
        .hexagon::after { transform: rotate(-60deg); }

        .inner-flare {
            position: absolute;
            inset: 10%;
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.3) 0%, transparent 60%);
            animation: breathe 3s ease-in-out infinite alternate;
        }

        .code-mark {
            z-index: 10;
            width: 80px; height: 80px;
            filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.8));
        }

        @keyframes breathe {
            0% { opacity: 0.5; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        .label {
            position: absolute; bottom: -50px;
            color: #fafafa;
            font-size: 1.4rem; font-weight: 700;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            letter-spacing: 0.2rem;
        }
        .label span { color: #a855f7; }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="grid"></div>
        <div class="hexagon">
            <div class="inner-flare"></div>
            <!-- Standard canonical Opta logo using brand primary, glowing in the center of the structure -->
            <svg class="code-mark" viewBox="0 0 200 200" fill="none">
                <g filter="url(#glow)">
                    <path d="M100 20 L20 180 L180 180 ZM60 140 L100 60 L140 140 Z" fill="#a855f7" />
                </g>
                <defs>
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="15" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>
            </svg>
        </div>
        <div class="label">OPTA<span>_</span>CODE</div>
    </div>
</body>
</html>
