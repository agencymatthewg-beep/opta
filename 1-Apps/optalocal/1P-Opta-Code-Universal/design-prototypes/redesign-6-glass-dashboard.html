<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opta Code — Prototype 6: Glass Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #09090b;
            --line: rgba(255, 255, 255, 0.08);
            --primary: #a855f7;
            --primary-dim: rgba(168, 85, 247, 0.15);
            --glass: rgba(24, 24, 27, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #fafafa;
            --text-soft: #a1a1aa;
            --text-muted: #52525b;
            --cyan: #06b6d4;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Sora', sans-serif;
            overflow: hidden;
        }

        /* Ambient Background */
        .ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob1 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: rgba(168, 85, 247, 0.08);
            filter: blur(120px);
            top: -200px;
            left: -200px;
            border-radius: 50%;
        }

        .blob2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(6, 182, 212, 0.05);
            filter: blur(100px);
            bottom: -100px;
            right: -100px;
            border-radius: 50%;
        }

        .layout {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-rows: 60px 1fr;
            height: 100vh;
        }

        /* Topbar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            background: var(--glass);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--glass-border);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .brand svg {
            filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.6));
        }

        /* Body */
        .body {
            padding: 1.5rem 2rem;
            display: flex;
            gap: 1.5rem;
        }

        /* Left Panel */
        .left-pane {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--glass);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
        }

        /* Widget Grid (Edit Mode Active) */
        .widget-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            align-content: start;
        }

        .tile {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(24px);
            border: 1px dashed rgba(168, 85, 247, 0.4);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            position: relative;
            /* EDIT MODE WIGGLE */
            animation: wiggle 0.3s infinite alternate;
            cursor: grab;
        }

        .tile::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(168, 85, 247, 0.03);
            border-radius: 16px;
        }

        .tile.s-m {
            grid-column: span 2;
        }

        .tile.s-t {
            grid-column: span 2;
            min-height: 240px;
        }

        /* Edit Mode Controls */
        .remove-btn {
            position: absolute;
            top: -8px;
            left: -8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--text-muted);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
        }

        .remove-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Empty Slot Add Button */
        .add-slot {
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-slot:hover {
            border-color: rgba(168, 85, 247, 0.4);
            background: rgba(168, 85, 247, 0.05);
        }

        .add-slot span {
            font-size: 1.5rem;
            color: var(--text-muted);
        }

        /* Project Modal Overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: rgba(24, 24, 27, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 600px;
            padding: 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .m-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .m-field {
            margin-bottom: 1.25rem;
        }

        .m-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .m-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-family: 'Sora';
            font-size: 0.9rem;
            outline: none;
        }

        .m-input:focus {
            border-color: var(--primary);
        }

        .m-colors {
            display: flex;
            gap: 0.5rem;
        }

        .m-color {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .m-color.active {
            border-color: white;
            transform: scale(1.1);
        }

        .m-textarea {
            width: 100%;
            height: 120px;
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-family: 'JetBrains Mono';
            font-size: 0.8rem;
            outline: none;
            resize: none;
        }

        .m-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        .m-btn {
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
        }

        .m-btn-cancel {
            background: transparent;
            color: var(--text-soft);
        }

        .m-btn-save {
            background: var(--primary);
            color: white;
        }

        @keyframes wiggle {
            0% {
                transform: rotate(-1deg);
            }

            100% {
                transform: rotate(1deg);
            }
        }
    </style>
</head>

<body>
    <div class="ambient">
        <div class="blob1"></div>
        <div class="blob2"></div>
    </div>

    <div class="layout">
        <header class="topbar">
            <div class="brand">
                <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="22" stroke="rgba(168,85,247,0.3)" stroke-width="1.5" />
                    <path d="M 32 14 A 14 14 0 1 0 32 34" stroke="#a855f7" stroke-width="3" stroke-linecap="round" />
                    <line x1="16" y1="36" x2="36" y2="12" stroke="#a855f7" stroke-width="3" stroke-linecap="round" />
                </svg>
                OPTA CODE
            </div>
            <div style="display:flex; gap:1rem;">
                <button
                    style="background:var(--primary); border:none; color:white; padding:0.4rem 1rem; border-radius:6px; font-family:'Sora'; font-size:0.75rem; font-weight:600; cursor:pointer; box-shadow:0 0 15px rgba(168,85,247,0.4);">DONE
                    EDITING</button>
            </div>
        </header>

        <div class="body">
            <div class="left-pane">
                <div class="chat-panel" style="opacity: 0.5; filter: blur(2px);">
                    <!-- Chat content blurred out during edit/modal -->
                </div>
            </div>

            <div class="widget-grid">
                <div class="tile s-m">
                    <button class="remove-btn">-</button>
                    <div style="font-size:0.7rem; font-weight:700; color:var(--text-muted); margin-bottom:1rem;">RUNTIME
                    </div>
                    <div style="font-size:1.5rem; font-family:'JetBrains Mono'; font-weight:700; color:var(--primary);">
                        67% MEM</div>
                </div>

                <div class="tile s-t">
                    <button class="remove-btn">-</button>
                    <div style="font-size:0.7rem; font-weight:700; color:var(--text-muted); margin-bottom:1rem;">ATPO
                        PLAN</div>
                    <div style="color:var(--text-soft); font-size:0.8rem; line-height:1.8;">✓ Phase 1 <br /> ○ Phase 2
                    </div>
                </div>

                <div class="add-slot"><span>+</span></div>
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay">
        <div class="modal">
            <div class="m-title">Create Project</div>

            <div class="m-field">
                <label class="m-label">Project Name</label>
                <input class="m-input" value="opta-core" />
            </div>

            <div class="m-field">
                <label class="m-label">Accent Color</label>
                <div class="m-colors">
                    <div class="m-color active" style="background:#a855f7"></div>
                    <div class="m-color" style="background:#06b6d4"></div>
                    <div class="m-color" style="background:#22c55e"></div>
                    <div class="m-color" style="background:#ef4444"></div>
                    <div class="m-color" style="background:#f59e0b"></div>
                </div>
            </div>

            <div class="m-field">
                <label class="m-label">AI Context Rules (CONTEXT.md)</label>
                <textarea class="m-textarea"># Architecture
Use the new SSR cookie pattern for all auth.
Never use `createBrowserClient`.</textarea>
            </div>

            <div class="m-actions">
                <button class="m-btn m-btn-cancel">Cancel</button>
                <button class="m-btn m-btn-save">Create Project</button>
            </div>
        </div>
    </div>
</body>

</html>
