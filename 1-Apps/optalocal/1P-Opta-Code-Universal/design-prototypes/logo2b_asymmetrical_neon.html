<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opta Code Logo - 2B: Asymmetrical Neon (Opta Circle Template)</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap");

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #09090b;
            font-family: "JetBrains Mono", monospace;
            overflow: hidden;
        }

        .logo-container {
            width: 400px;
            height: 400px;
        }

        .hex-path-1 {
            stroke-dasharray: 40 10 5 5 80 20;
            animation: dash-flow 10s linear infinite;
        }

        .hex-path-2 {
            stroke-dasharray: 5 15;
            animation: dash-flow-reverse 8s linear infinite;
        }

        @keyframes dash-flow {
            to {
                stroke-dashoffset: 200;
            }
        }

        @keyframes dash-flow-reverse {
            to {
                stroke-dashoffset: -200;
            }
        }

        @keyframes glitch-anim {

            0%,
            95%,
            100% {
                transform: translate(0, 0) scale(1);
                filter: drop-shadow(0 0 5px rgba(168, 85, 247, 0.8));
                opacity: 1;
            }

            96% {
                transform: translate(-1px, 1px) scale(0.98);
                filter: drop-shadow(0 0 8px #06b6d4);
                opacity: 0.8;
            }

            97% {
                transform: translate(1px, -1px) scale(1.02);
                filter: drop-shadow(0 0 8px #ef4444);
                opacity: 0.9;
            }

            98% {
                transform: translate(-1px, -1px) scale(1);
                filter: drop-shadow(0 0 5px rgba(168, 85, 247, 0.8));
                opacity: 1;
            }
        }

        .glitch-code {
            animation: glitch-anim 3s infinite;
        }

        .label {
            margin-top: 40px;
            color: #fafafa;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.4rem;
        }

        .label span {
            color: #a855f7;
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <svg width="100%" height="100%" viewBox="0 0 210 210" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
                    <feGaussianBlur stdDeviation="3.5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <radialGradient id="voidFill" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#100e18" />
                    <stop offset="60%" stop-color="#0c0a14" />
                    <stop offset="100%" stop-color="#09090b" />
                </radialGradient>
                <linearGradient id="ringHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
                    <!-- Code is Cyan/Violet primarily -->
                    <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.9" />
                    <stop offset="25%" stop-color="#a855f7" stop-opacity="0.7" />
                    <stop offset="55%" stop-color="#7c3aed" stop-opacity="0.4" />
                    <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.15" />
                </linearGradient>
                <radialGradient id="centreBloom" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8" />
                    <stop offset="40%" stop-color="#a855f7" stop-opacity="0.4" />
                    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
                </radialGradient>
            </defs>

            <!-- Base Canonical Template Opta Circle -->
            <!-- We drop the outerGlow circle as we are on void background -->
            <circle cx="105" cy="105" r="88" fill="url(#voidFill)" />
            <circle cx="105" cy="105" r="96" stroke="#06b6d4" stroke-width="6" stroke-opacity="0.06" fill="none" />
            <circle cx="105" cy="105" r="93" stroke="#a855f7" stroke-width="3" stroke-opacity="0.10" fill="none" />
            <circle cx="105" cy="105" r="90" stroke="url(#ringHighlight)" stroke-width="1.6" fill="none"
                filter="url(#ringGlow)" />
            <circle cx="105" cy="105" r="87" stroke="#a855f7" stroke-width="0.6" stroke-opacity="0.12" fill="none" />

            <g transform="translate(105, 105)">
                <!-- Option 2B: Asymmetrical Neon Hex Structure mapped into the radius of 88px inside the circle -->
                <g filter="url(#ringGlow)">
                    <!-- A hexagon scaled to fit within the r=88 void -->
                    <!-- R=55, W=47.63 -->
                    <path class="hex-path-1"
                        d="M 0 -55 L 47.63 -27.5 L 47.63 27.5 L 0 55 L -47.63 27.5 L -47.63 -27.5 Z"
                        fill="rgba(12, 12, 18, 0.4)" stroke="#a855f7" stroke-width="1.5" />

                    <!-- Broken outer tech ring -->
                    <path class="hex-path-2"
                        d="M 0 -65 L 56.29 -32.5 L 56.29 32.5 L 0 65 L -56.29 32.5 L -56.29 -32.5 Z" fill="none"
                        stroke="#06b6d4" stroke-width="1" opacity="0.6" transform="rotate(15)" />

                    <!-- Background code bracket motif -->
                    <path d="M-25 10 C-35 10 -35 0 -45 0 C-35 0 -35 -10 -25 -10" fill="none" stroke="#a855f7"
                        stroke-width="2" opacity="0.4" />
                    <path d="M25 10 C35 10 35 0 45 0 C35 0 35 -10 25 -10" fill="none" stroke="#a855f7" stroke-width="2"
                        opacity="0.4" />
                </g>

                <!-- Core Glyph: Canonical Code bracket SVG -->
                <g class="glitch-code" transform="scale(0.35) translate(-100, -100)">
                    <path d="M100 20 L20 180 L180 180 ZM60 140 L100 60 L140 140 Z" fill="#fafafa" />
                </g>
            </g>

            <circle cx="105" cy="105" r="28" fill="url(#centreBloom)" fill-opacity="0.15" />
        </svg>
    </div>

    <div class="label">OPTA<span>_</span>CODE</div>
</body>

</html>
