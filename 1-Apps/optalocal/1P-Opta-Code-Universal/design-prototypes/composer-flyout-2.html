<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opta Code - Composer Overrides (Inline Pills)</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #09090b;
    --surface: #0c0c12;
    --violet: #a855f7;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --text-pri: #fafafa;
    --text-sec: #a1a1aa;
    --text-mut: #52525b;
    --border: rgba(255, 255, 255, 0.1);
  }
  body {
    background-color: var(--void);
    color: var(--text-pri);
    font-family: 'Sora', sans-serif;
    margin: 0;
    padding: 4rem;
    display: flex;
    justify-content: center;
    align-items: flex-end; 
    height: 100vh;
    box-sizing: border-box;
  }

  .composer-stack {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* The Inline Settings Bar */
  .settings-bar {
    display: flex;
    gap: 8px;
    padding: 0 8px;
    opacity: 1;
    transform: translateY(0);
    transition: all 0.2s;
  }

  .pill-dropdown {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-sec);
    cursor: pointer;
    transition: all 0.2s;
  }
  .pill-dropdown:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text-pri);
  }
  .pill-dropdown.active {
    background: rgba(168,85,247,0.1);
    border-color: rgba(168,85,247,0.4);
    color: var(--violet);
  }
  
  .pill-dropdown.danger {
    background: rgba(239, 68, 68, 0.05);
    border-color: rgba(239, 68, 68, 0.3);
    color: var(--red);
  }

  /* The actual chat input bar */
  .composer-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  
  .composer-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-pri);
    font-family: 'Sora';
    font-size: 15px;
    outline: none;
  }
  
  .send-btn {
    background: var(--violet);
    border: none;
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    cursor: pointer;
  }

</style>
</head>
<body>

<div class="composer-stack">
  
  <div class="settings-bar">
    <div class="pill-dropdown">
      Mode: <span style="color:var(--text-pri)">Do</span> ▾
    </div>
    <div class="pill-dropdown active">
      Model: <span>Qwen-2.5-Coder</span> ▾
    </div>
    <div class="pill-dropdown danger">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      L4 Autonomy
    </div>
  </div>

  <div class="composer-bar">
    <input type="text" class="composer-input" placeholder="Ask Opta to build something...">
    <button class="send-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
    </button>
  </div>
  
</div>

</body>
</html>
