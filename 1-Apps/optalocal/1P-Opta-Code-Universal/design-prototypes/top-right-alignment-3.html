<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Right Alignment - Concept 3: Floating Action Island</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --opta-bg: #09090b;
            --opta-primary-glow: #a855f7;
            --opta-text-primary: #fafafa;
            --opta-text-secondary: #a1a1aa;
            --opta-text-muted: #52525b;
        }

        body {
            margin: 0;
            background: var(--opta-bg);
            color: var(--opta-text-primary);
            font-family: 'Sora', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .v1-topbar {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0 1.5rem;
        }

        .v1-logo-text {
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .v1-body {
            flex: 1;
            display: flex;
            padding: 2rem;
            justify-content: center;
            align-items: center;
            color: var(--opta-text-muted);
            font-family: 'JetBrains Mono';
        }

        /* CONCEPT 3: FLOATING ACTION ISLAND */
        .floating-action-island {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 99px;
            padding: 0.25rem 0.5rem;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }

        .v1-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: transparent;
            border: none;
            padding: 0.35rem 0.75rem;
            border-radius: 99px;
            cursor: pointer;
            color: var(--opta-text-secondary);
            font-family: 'Sora', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .v1-btn:hover {
            color: var(--opta-text-primary);
            background: rgba(168, 85, 247, 0.15);
        }

        .v1-btn svg {
            width: 14px;
            height: 14px;
            color: var(--opta-primary-glow);
        }

        .divider {
            width: 1px;
            height: 16px;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <header class="v1-topbar">
        <div class="v1-logo-text">OPTA CODE</div>
    </header>

    <div class="floating-action-island">
        <button class="v1-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9" />
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
            </svg>
            <span>TILES</span>
        </button>
        <div class="divider"></div>
        <button class="v1-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
            <span>ACCOUNTS</span>
        </button>
    </div>

    <div class="v1-body">
        Concept 3:<br>Buttons form a unified "floating island" pill layered above the application chrome. Extremely
        modern, saves topbar horizontal space.
    </div>
</body>

</html>
