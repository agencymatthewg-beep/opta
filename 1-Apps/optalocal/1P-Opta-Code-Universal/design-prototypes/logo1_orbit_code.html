<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opta Code Logo - Design 1</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #09090b; }
        .logo-container { position: relative; width: 300px; height: 300px; }
        .ring { 
            position: absolute; 
            inset: 0; 
            border: 2px solid rgba(168, 85, 247, 0.2); 
            border-radius: 50%;
            animation: spin 20s linear infinite;
        }
        .ring::before {
            content: '';
            position: absolute;
            top: -2px; left: 50%;
            width: 100px; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.8), transparent);
            transform: translateX(-50%);
        }
        .core {
            position: absolute;
            inset: 35%;
            display: flex; justify-content: center; align-items: center;
        }
        .core svg { width: 100%; height: 100%; filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.4)); }
        
        .orbit {
            position: absolute;
            inset: -10%;
            border: 1px solid rgba(6, 182, 212, 0.3); /* Neon Cyan hint */
            border-radius: 50%;
            transform: rotateX(70deg) rotateY(20deg);
            animation: orbit-spin 12s linear infinite;
            transform-style: preserve-3d;
        }
        .node {
            position: absolute; width: 6px; height: 6px; border-radius: 50%;
            background: #06b6d4; box-shadow: 0 0 8px #06b6d4;
            top: 50%; left: -3px; transform: translateY(-50%);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes orbit-spin { 
            0% { transform: rotateX(70deg) rotateY(20deg) rotateZ(0deg); }
            100% { transform: rotateX(70deg) rotateY(20deg) rotateZ(360deg); }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="ring"></div>
        <div class="orbit"><div class="node"></div></div>
        <div class="core">
            <svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
            </svg>
        </div>
    </div>
</body>
</html>
