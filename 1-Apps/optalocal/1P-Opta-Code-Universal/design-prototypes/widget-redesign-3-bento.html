<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Redesign 3 - Dynamic Bento</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --primary: #8b5cf6;
            --text-main: #fafafa;
            --text-dim: #a1a1aa;
            --text-muted: #52525b;
            --neon-green: #22c55e;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Sora', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Fake Sidebar & Center for context */
        .sidebar {
            width: 260px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
        }

        .sidebar-top {
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--text-dim);
        }

        .sidebar-footer {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--card-bg);
            padding: 0.5rem;
            border-radius: 99px;
            border: 1px solid var(--card-border);
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono';
            font-weight: 700;
            color: #fff;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            padding-right: 1rem;
        }

        .user-name {
            font-size: 0.8rem;
            font-weight: 600;
        }

        .user-device {
            font-family: 'JetBrains Mono';
            font-size: 0.6rem;
            color: var(--text-dim);
        }

        .center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .watermark {
            font-family: 'JetBrains Mono';
            font-size: 4rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.02);
            text-align: center;
        }

        /* CONCEPT 3: DYNAMIC BENTO (Right Pane) */
        .right-pane {
            width: 380px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
        }

        .right-pane::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 1px;
            background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        /* Floating Action Island (Pill) */
        .top-action-island {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 99px;
            padding: 0.35rem;
            align-self: flex-end;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: 'Sora', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .action-btn svg {
            width: 14px;
            height: 14px;
            color: var(--primary);
        }

        .island-divider {
            width: 1px;
            height: 16px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 4px;
        }

        /* Widget Box Generic Bento */
        .widget-bento {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .widget-bento:hover {
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .widget-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .widget-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Sora', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .widget-title svg {
            width: 16px;
            height: 16px;
            color: var(--text-dim);
        }

        /* ATPO Plan Bento */
        .atpo-stepper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .atpo-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            z-index: 1;
            transform: translateY(-50%);
        }

        .atpo-line-fill {
            position: absolute;
            top: 50%;
            left: 0;
            height: 2px;
            width: 50%;
            background: var(--primary);
            z-index: 2;
            transform: translateY(-50%);
            box-shadow: 0 0 10px var(--primary);
        }

        .atpo-step {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid rgba(255, 255, 255, 0.1);
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono';
            font-size: 0.6rem;
            font-weight: 700;
        }

        .atpo-step.done {
            border-color: var(--primary);
            background: rgba(139, 92, 246, 0.2);
            color: var(--primary);
        }

        .atpo-step.active {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }

        .atpo-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 0.75rem;
            font-size: 0.7rem;
            color: var(--text-dim);
        }

        .atpo-labels span.active {
            color: var(--text-main);
            font-weight: 600;
        }

        /* CLI Logs Bento */
        .cli-bento {
            flex: 1;
        }

        .cli-console {
            background: #000;
            border-radius: 12px;
            padding: 1rem;
            font-family: 'JetBrains Mono';
            font-size: 0.75rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .cli-console-header {
            display: flex;
            gap: 4px;
            margin-bottom: 0.5rem;
        }

        .mac-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .red {
            background: #ff5f56;
        }

        .yellow {
            background: #ffbd2e;
        }

        .green {
            background: #27c93f;
        }

        .cli-log {
            color: var(--text-dim);
        }

        .cli-input-flex {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
            padding-top: 1rem;
        }

        .cli-input-flex span {
            color: var(--primary);
            font-weight: 700;
        }

        .cli-input-flex input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: 'JetBrains Mono';
            font-size: 0.75rem;
            width: 100%;
            outline: none;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div>
            <div class="sidebar-top">PROJECTS</div>
            <div style="margin-top:2rem; font-size:0.8rem; color:var(--text-dim);">No sessions yet</div>
        </div>
        <div class="sidebar-footer">
            <div class="avatar">M</div>
            <div class="user-info">
                <div class="user-name">Matthew Byrden</div>
                <div class="user-device">Workstation - Opta48</div>
            </div>
        </div>
    </div>
    <div class="center">
        <div class="watermark">
            <div style="font-size:0.8rem; letter-spacing:4px; margin-bottom:1rem; color:var(--text-dim);">DESIGN
                PROTOTYPE</div>
            CONCEPT 3<br>DYNAMIC BENTO
        </div>
    </div>

    <!-- CONCEPT 3 RIGHT PANE -->
    <div class="right-pane">
        <!-- Action Island (Pill) -->
        <div class="top-action-island">
            <button class="action-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9" />
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                </svg>
                Tiles
            </button>
            <div class="island-divider"></div>
            <button class="action-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                Accounts
            </button>
        </div>

        <!-- ATPO Bento -->
        <div class="widget-bento">
            <div class="widget-header">
                <div class="widget-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                    </svg>
                    ATPO Plan
                </div>
                <div style="font-size:0.7rem; color:var(--primary); font-weight:600;">IN PROGRESS</div>
            </div>
            <div class="atpo-stepper">
                <div class="atpo-line"></div>
                <div class="atpo-line-fill"></div>
                <div class="atpo-step done">✓</div>
                <div class="atpo-step active">2</div>
                <div class="atpo-step">3</div>
            </div>
            <div class="atpo-labels">
                <span>Config</span>
                <span class="active">Refactor</span>
                <span>Verify</span>
            </div>
        </div>

        <!-- CLI Bento -->
        <div class="widget-bento cli-bento">
            <div class="widget-header">
                <div class="widget-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="4 17 10 11 4 5" />
                        <line x1="12" y1="19" x2="20" y2="19" />
                    </svg>
                    CLI Logs
                </div>
            </div>
            <div class="cli-console">
                <div class="cli-console-header">
                    <div class="mac-dot red"></div>
                    <div class="mac-dot yellow"></div>
                    <div class="mac-dot green"></div>
                </div>
                <div class="cli-log">Done in 0.4s.</div>
                <div class="cli-log">Waiting for changes...</div>
                <div class="cli-input-flex">
                    <span>></span>
                    <input type="text" placeholder="Type a command..." disabled>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
