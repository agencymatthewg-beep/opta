<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opta Code Logo - 2C: Glassmorphism Core (Opta Circle Template)</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap");

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #09090b;
            font-family: "JetBrains Mono", monospace;
            overflow: hidden;
        }

        .logo-container {
            width: 400px;
            height: 400px;
        }

        .ambient-spin {
            animation: slowSpin 60s linear infinite;
            transform-origin: center;
        }

        @keyframes slowSpin {
            100% {
                transform: rotate(360deg);
            }
        }

        .glass-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        .label {
            margin-top: 40px;
            color: #fafafa;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.4rem;
        }

        .label span {
            color: #06b6d4;
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <svg width="100%" height="100%" viewBox="0 0 210 210" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
                    <feGaussianBlur stdDeviation="3.5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>

                <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <!-- Create glass opacity matrix -->
                    <feComponentTransfer in="blur" result="glass">
                        <feFuncA type="linear" slope="0.5" />
                    </feComponentTransfer>
                    <feComposite in="SourceGraphic" in2="glass" operator="over" />
                </filter>

                <radialGradient id="voidFill" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#100e18" />
                    <stop offset="60%" stop-color="#0c0a14" />
                    <stop offset="100%" stop-color="#09090b" />
                </radialGradient>
                <linearGradient id="ringHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#c084fc" stop-opacity="0.9" />
                    <stop offset="25%" stop-color="#a855f7" stop-opacity="0.7" />
                    <stop offset="55%" stop-color="#06b6d4" stop-opacity="0.4" />
                    <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.15" />
                </linearGradient>
                <radialGradient id="centreBloom" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#a855f7" stop-opacity="0.7" />
                    <stop offset="40%" stop-color="#06b6d4" stop-opacity="0.3" />
                    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
                </radialGradient>
            </defs>

            <!-- Base Canonical Template Opta Circle -->
            <circle cx="105" cy="105" r="88" fill="url(#voidFill)" />
            <circle cx="105" cy="105" r="96" stroke="#a855f7" stroke-width="6" stroke-opacity="0.06" fill="none" />
            <circle cx="105" cy="105" r="93" stroke="#a855f7" stroke-width="3" stroke-opacity="0.10" fill="none" />
            <circle cx="105" cy="105" r="90" stroke="url(#ringHighlight)" stroke-width="1.6" fill="none"
                filter="url(#ringGlow)" />
            <circle cx="105" cy="105" r="87" stroke="#a855f7" stroke-width="0.6" stroke-opacity="0.12" fill="none" />

            <!-- Ambient inner rings -->
            <g transform="translate(105, 105)" class="ambient-spin">
                <circle cx="0" cy="0" r="60" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.2" fill="none"
                    stroke-dasharray="2 4" />
                <circle cx="0" cy="0" r="45" stroke="#06b6d4" stroke-width="1.0" stroke-opacity="0.15" fill="none"
                    stroke-dasharray="10 15" />
            </g>

            <g transform="translate(105, 105)">
                <!-- Option 2C: Glassmorphism base matching hex shape using SVG filter -->
                <g class="glass-float">
                    <!-- Glass underlying darkness/blur representation -->
                    <!-- R=45, W=38.97 -->
                    <path d="M 0 -45 L 38.97 -22.5 L 38.97 22.5 L 0 45 L -38.97 22.5 L -38.97 -22.5 Z"
                        fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5"
                        filter="url(#glassBlur)" />

                    <!-- Solid Neon Rim underneath the glass -->
                    <path d="M 0 -40 L 34.64 -20 L 34.64 20 L 0 40 L -34.64 20 L -34.64 -20 Z" fill="none"
                        stroke="#a855f7" stroke-width="2" filter="url(#ringGlow)" opacity="0.6" />

                    <!-- Core Glyph: Canonical Code bracket SVG -->
                    <g transform="scale(0.3) translate(-100, -100)">
                        <path d="M100 20 L20 180 L180 180 ZM60 140 L100 60 L140 140 Z" fill="#BB86FC" />
                    </g>
                </g>
            </g>

            <circle cx="105" cy="105" r="30" fill="url(#centreBloom)" fill-opacity="0.25"
                style="mix-blend-mode: screen;" />
        </svg>
    </div>

    <div class="label">OPTA<span>[</span>CODE<span>]</span></div>
</body>

</html>
