<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Opta Settings - Concept 3 (Glassmorphic Horizontal Pill)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --opta-bg: #09090b;
            --opta-surface: #18181b;
            --opta-border: rgba(255, 255, 255, 0.05);
            --opta-primary: #8b5cf6;
            --opta-primary-glow: #a855f7;
            --opta-text-primary: #fafafa;
            --opta-text-secondary: #a1a1aa;
        }

        body {
            background-color: var(--opta-bg);
            color: var(--opta-text-primary);
            font-family: "Sora", sans-serif;
            margin: 0;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -20%, rgba(139, 92, 246, 0.1), transparent 50%);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.25rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--opta-border);
            border-radius: 99px;
            padding: 0.75rem 1.25rem 0.75rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            transition: background 0.3s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-2px);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(139, 92, 246, 0.15);
        }

        .icon-wrap {
            background: #09090b;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--opta-text-secondary);
            flex-shrink: 0;
            transition: color 0.3s, border-color 0.3s;
        }

        .card:hover .icon-wrap {
            color: var(--opta-primary-glow);
            border-color: rgba(139, 92, 246, 0.5);
        }

        .info {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--opta-text-primary);
        }

        .desc {
            font-size: 0.65rem;
            color: var(--opta-text-secondary);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="header">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
                d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
            <circle cx="12" cy="12" r="3" />
        </svg>
        <h1>Opta Settings</h1>
    </div>
    <div class="grid">
        <div class="card">
            <div class="icon-wrap">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8l-6 6v12a2 2 0 0 0 2 2z" />
                    <line x1="14" y1="2" x2="14" y2="22" />
                    <line x1="4" y1="12" x2="14" y2="12" />
                </svg>
            </div>
            <div class="info">
                <div class="title">General</div>
                <div class="desc">App preferences, file behavior, and updates</div>
            </div>
        </div>

        <div class="card">
            <div class="icon-wrap">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 16v-4" />
                    <path d="M12 8h.01" />
                </svg>
            </div>
            <div class="info">
                <div class="title">Intelligence</div>
                <div class="desc">LMX Engine bindings, default models, and context</div>
            </div>
        </div>

        <div class="card">
            <div class="icon-wrap">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242" />
                    <path d="M12 12v9" />
                    <path d="M8 17l4 4 4-4" />
                </svg>
            </div>
            <div class="info">
                <div class="title">Connection</div>
                <div class="desc">Daemon remote host logic and HTTP/WS sockets</div>
            </div>
        </div>

        <div class="card">
            <div class="icon-wrap">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path
                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                    <polyline points="3.29 7 12 12 20.71 7" />
                    <line x1="12" y1="22" x2="12" y2="12" />
                </svg>
            </div>
            <div class="info">
                <div class="title">Interface</div>
                <div class="desc">Widget grids, typography, and visual bounds</div>
            </div>
        </div>
    </div>
</body>

</html>
