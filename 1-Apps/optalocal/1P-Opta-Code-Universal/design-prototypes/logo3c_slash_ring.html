<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opta Code Logo - 3C: Slash Ring</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap");

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #09090b;
            font-family: "JetBrains Mono", monospace;
            overflow: hidden;
        }

        .logo-container {
            width: 400px;
            height: 400px;
        }

        .ambient-spin {
            animation: spin 30s linear infinite;
            transform-origin: 105px 105px;
        }

        .ambient-spin-reverse {
            animation: spin-reverse 45s linear infinite;
            transform-origin: 105px 105px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            100% {
                transform: rotate(-360deg);
            }
        }

        .label {
            margin-top: 40px;
            color: #fafafa;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.4rem;
        }

        .label span {
            color: #06b6d4;
        }
    </style>
</head>

<body>
    <div class="logo-container">
        <svg width="100%" height="100%" viewBox="0 0 210 210" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
                    <feGaussianBlur stdDeviation="3.5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <filter id="cyanBloom" x="-200%" y="-200%" width="500%" height="500%">
                    <feGaussianBlur stdDeviation="5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <filter id="violetGlow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="2" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="1.5" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
                <radialGradient id="voidFill" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#100e18" />
                    <stop offset="60%" stop-color="#0c0a14" />
                    <stop offset="100%" stop-color="#09090b" />
                </radialGradient>
                <linearGradient id="ringHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.9" />
                    <stop offset="25%" stop-color="#a855f7" stop-opacity="0.7" />
                    <stop offset="55%" stop-color="#7c3aed" stop-opacity="0.4" />
                    <stop offset="100%" stop-color="#a855f7" stop-opacity="0.15" />
                </linearGradient>
                <radialGradient id="centreBloom" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.7" />
                    <stop offset="40%" stop-color="#a855f7" stop-opacity="0.3" />
                    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
                </radialGradient>
            </defs>

            <!-- Base Canonical Template Opta Circle -->
            <circle cx="105" cy="105" r="88" fill="url(#voidFill)" />
            <circle cx="105" cy="105" r="96" stroke="#06b6d4" stroke-width="6" stroke-opacity="0.06" fill="none" />
            <circle cx="105" cy="105" r="93" stroke="#a855f7" stroke-width="3" stroke-opacity="0.10" fill="none" />
            <circle cx="105" cy="105" r="90" stroke="url(#ringHighlight)" stroke-width="1.6" fill="none"
                filter="url(#ringGlow)" />
            <circle cx="105" cy="105" r="87" stroke="#a855f7" stroke-width="0.6" stroke-opacity="0.12" fill="none" />

            <!-- Option 3C: Slash Ring Background Elements -->
            <g class="ambient-spin-reverse">
                <!-- Inner thin orbit line -->
                <circle cx="105" cy="105" r="54" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.3" fill="none" />

                <!-- Inner small slashes -->
                <g transform="translate(105, 105)" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round"
                    opacity="0.6" filter="url(#cyanGlow)">
                    <line x1="-3" y1="-50" x2="3" y2="-58" transform="rotate(0)" />
                    <line x1="-3" y1="-50" x2="3" y2="-58" transform="rotate(60)" />
                    <line x1="-3" y1="-50" x2="3" y2="-58" transform="rotate(120)" />
                    <line x1="-3" y1="-50" x2="3" y2="-58" transform="rotate(180)" />
                    <line x1="-3" y1="-50" x2="3" y2="-58" transform="rotate(240)" />
                    <line x1="-3" y1="-50" x2="3" y2="-58" transform="rotate(300)" />
                </g>
            </g>

            <!-- Outer heavy Slash Ring -->
            <g class="ambient-spin">
                <g transform="translate(105, 105)" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round"
                    filter="url(#violetGlow)">
                    <!-- 12 Slashes forming the primary structural ring -->
                    <line x1="-5" y1="-67" x2="5" y2="-77" transform="rotate(0)" />
                    <line x1="-5" y1="-67" x2="5" y2="-77" transform="rotate(30)" />
                    <line x1="-5" y1="-67" x2="5" y2="-77" transform="rotate(60)" />
                    <line x1="-5" y1="-67" x2="5" y2="-77" transform="rotate(90)" opacity="0.2" /> <!-- Glitch gap -->
                    <line x1="-5" y1="-67" x2="5" y2="-77" transform="rotate(120)" />
                    <line x1="-5" y1="-67" x2="5" y2="-77" transform="rotate(150)" />
                    <line x1="-5" y1="-67" x2="5" y2="-77" transform="rotate(180)" />
                    <line x1="-5" y1="-67" x2="5" y2="-77" transform="rotate(210)" />
                    <line x1="-5" y1="-67" x2="5" y2="-77" transform="rotate(240)" />
                    <line x1="-5" y1="-67" x2="5" y2="-77" transform="rotate(270)" opacity="0.2" /> <!-- Glitch gap -->
                    <line x1="-5" y1="-67" x2="5" y2="-77" transform="rotate(300)" />
                    <line x1="-5" y1="-67" x2="5" y2="-77" transform="rotate(330)" />
                </g>
            </g>

            <g transform="translate(105, 105)">
                <!-- FOREGROUND MARK: Data Grid / Terminal Hybrid -->

                <!-- Central canonical { } motif, heavily stylized -->
                <path d="M -8 -16 C -18 -16 -18 0 -26 0 C -18 0 -18 16 -8 16" fill="none" stroke="#fafafa"
                    stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" />

                <path d="M 8 -16 C 18 -16 18 0 26 0 C 18 0 18 16 8 16" fill="none" stroke="#fafafa" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round" opacity="0.95" />

                <!-- Central Dot -->
                <circle cx="0" cy="0" r="4" fill="#06b6d4" filter="url(#cyanBloom)" />

                <!-- Stylised background data track -->
                <line x1="-35" y1="0" x2="-22" y2="0" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"
                    stroke-dasharray="2 4" opacity="0.6" />
                <line x1="22" y1="0" x2="35" y2="0" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"
                    stroke-dasharray="2 4" opacity="0.6" />
            </g>

            <circle cx="105" cy="105" r="28" fill="url(#centreBloom)" fill-opacity="0.2" />
        </svg>
    </div>

    <div class="label">OPTA<span>_</span>CODE</div>
</body>

</html>
