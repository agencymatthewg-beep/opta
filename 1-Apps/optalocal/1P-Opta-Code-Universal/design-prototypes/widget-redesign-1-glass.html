<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Redesign 1 - Glass Matrix</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --primary: #8b5cf6;
            --text-main: #fafafa;
            --text-dim: #a1a1aa;
            --neon-green: #22c55e;
            --neon-pink: #ec4899;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Sora', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Fake Sidebar & Center for context */
        .sidebar {
            width: 260px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
        }

        .sidebar-top {
            font-size: 0.8rem;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--text-dim);
        }

        .sidebar-footer {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid var(--primary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono';
            font-weight: 600;
            color: var(--primary);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.3);
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .user-device {
            font-family: 'JetBrains Mono';
            font-size: 0.65rem;
            color: var(--text-dim);
        }

        .center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .watermark {
            font-family: 'JetBrains Mono';
            font-size: 4rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.02);
            text-align: center;
        }

        /* CONCEPT 1: GLASS MATRIX (Right Pane) */
        .right-pane {
            width: 320px;
            background: linear-gradient(180deg, rgba(9, 9, 11, 0.8) 0%, rgba(139, 92, 246, 0.02) 100%);
            border-left: 1px solid rgba(139, 92, 246, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: inset 1px 0 20px rgba(139, 92, 246, 0.05);
        }

        /* Floating Settings Island */
        .top-action-island {
            display: flex;
            gap: 0.25rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 0.25rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            align-self: flex-end;
        }

        .action-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            padding: 0.5rem;
            border-radius: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-btn:hover {
            color: var(--primary);
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.2);
        }

        .action-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Widget Box 1: ATPO Plan */
        .widget-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }

        .widget-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        .widget-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'JetBrains Mono';
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--primary);
            text-transform: uppercase;
        }

        .widget-header svg {
            width: 14px;
            height: 14px;
        }

        .atpo-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .atpo-item.active {
            color: var(--text-main);
            font-weight: 600;
        }

        .atpo-item.done {
            color: var(--text-dim);
            text-decoration: line-through;
        }

        .atpo-node {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1px solid var(--text-dim);
        }

        .atpo-item.active .atpo-node {
            border-color: var(--primary);
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
        }

        .atpo-item.done .atpo-node {
            border-color: var(--neon-green);
            background: var(--neon-green);
        }

        /* Widget Box 2: CLI Logs */
        .cli-box {
            border-color: rgba(34, 197, 94, 0.2);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: inset 0 0 20px rgba(34, 197, 94, 0.02);
        }

        .cli-box::before {
            background: linear-gradient(90deg, transparent, var(--neon-green), transparent);
        }

        .cli-box .widget-header {
            color: var(--neon-green);
        }

        .cli-log-line {
            font-family: 'JetBrains Mono';
            font-size: 0.7rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .cli-log-line.success {
            color: var(--neon-green);
        }

        .cli-input-wrapper {
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px dashed rgba(34, 197, 94, 0.2);
            padding-top: 0.5rem;
        }

        .cli-prompt {
            color: var(--neon-green);
            font-family: 'JetBrains Mono';
            font-size: 0.7rem;
        }

        .cli-input {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: 'JetBrains Mono';
            font-size: 0.7rem;
            width: 100%;
            outline: none;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div>
            <div class="sidebar-top">PROJECTS</div>
            <div style="margin-top:2rem; font-size:0.8rem; color:var(--text-dim);">No sessions yet</div>
        </div>
        <div class="sidebar-footer">
            <div class="avatar">M</div>
            <div class="user-info">
                <div class="user-name">Matthew Byrden</div>
                <div class="user-device">Workstation - Opta48</div>
            </div>
        </div>
    </div>
    <div class="center">
        <div class="watermark">
            <div style="font-size:0.8rem; letter-spacing:4px; margin-bottom:1rem; color:var(--text-dim);">DESIGN
                PROTOTYPE</div>
            CONCEPT 1<br>GLASS MATRIX
        </div>
    </div>

    <!-- CONCEPT 1 RIGHT PANE -->
    <div class="right-pane">
        <!-- Action Island -->
        <div class="top-action-island">
            <button class="action-btn" title="Tiles">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9" />
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                </svg>
            </button>
            <button class="action-btn" title="Accounts">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
            </button>
        </div>

        <!-- ATPO Widget -->
        <div class="widget-box">
            <div class="widget-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                </svg>
                ATPO PLAN
            </div>
            <div class="atpo-item done">
                <div class="atpo-node"></div>1. Read existing config
            </div>
            <div class="atpo-item active">
                <div class="atpo-node"></div>2. Refactor client
            </div>
            <div class="atpo-item">
                <div class="atpo-node"></div>3. Verification
            </div>
        </div>

        <!-- CLI Widget -->
        <div class="widget-box cli-box">
            <div class="widget-header">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="4 17 10 11 4 5" />
                    <line x1="12" y1="19" x2="20" y2="19" />
                </svg>
                OPTA CLI LOGS
            </div>
            <div class="cli-log-line success">✓ Loaded dependencies</div>
            <div class="cli-log-line">Waiting for events...</div>
            <div class="cli-input-wrapper">
                <span class="cli-prompt">❯</span>
                <input type="text" class="cli-input" placeholder="Type a CLI command..." disabled>
            </div>
        </div>
    </div>
</body>

</html>
