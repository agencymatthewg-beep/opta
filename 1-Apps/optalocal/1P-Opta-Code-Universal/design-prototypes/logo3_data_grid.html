<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opta Code Logo - Data Grid Alignment</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap");
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #09090b; font-family: "JetBrains Mono", monospace;}
        .canvas { position: relative; width: 400px; height: 400px; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(168, 85, 247, 0.1) 0%, transparent 60%); }
        
        .grid-matrix {
            position: absolute; inset: 20%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 4px;
        }

        .cell {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 2px;
            transition: all 0.5s ease;
        }

        .cell.active {
            background: rgba(168, 85, 247, 0.8);
            border-color: #a855f7;
            box-shadow: 0 0 10px #a855f7;
            animation: pulse-cell 2s infinite alternate;
        }

        .cell.accent {
            background: #06b6d4;
            border-color: #06b6d4;
            box-shadow: 0 0 15px #06b6d4;
            animation: pulse-cell-accent 3s infinite alternate;
        }

        @keyframes pulse-cell {
            0% { opacity: 0.6; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        @keyframes pulse-cell-accent {
            0% { opacity: 0.8; transform: scale(1); filter: hue-rotate(0deg); }
            100% { opacity: 1; transform: scale(1.1); filter: hue-rotate(20deg); }
        }

        .core-text {
            position: absolute;
            color: #fafafa;
            font-size: 2rem;
            font-weight: bold;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.8);
            z-index: 10;
        }

        .label {
            position: absolute;
            bottom: -50px;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            letter-spacing: 0.4em;
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="grid-matrix" id="matrix">
            <!-- 5x5 Grid for stylized bracket {} structure -->
            <div class="cell"></div> <div class="cell active"></div> <div class="cell active"></div> <div class="cell active"></div> <div class="cell"></div>
            <div class="cell active"></div> <div class="cell accent"></div> <div class="cell"></div> <div class="cell accent"></div> <div class="cell active"></div>
            <div class="cell active"></div> <div class="cell"></div> <div class="cell accent"></div> <div class="cell"></div> <div class="cell active"></div>
            <div class="cell active"></div> <div class="cell accent"></div> <div class="cell"></div> <div class="cell accent"></div> <div class="cell active"></div>
            <div class="cell"></div> <div class="cell active"></div> <div class="cell active"></div> <div class="cell active"></div> <div class="cell"></div>
        </div>
        
        <!-- We use an overlay element for the central Code motif -->
        <div class="core-text">{ }</div>
        <div class="label">OPTA CODE</div>
    </div>
</body>
</html>
