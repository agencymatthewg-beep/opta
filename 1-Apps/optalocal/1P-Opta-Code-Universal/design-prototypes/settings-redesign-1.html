<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Opta Settings - Concept 1 (Holographic Bento)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --opta-bg: #09090b;
            --opta-surface: #18181b;
            --opta-border: rgba(255, 255, 255, 0.08);
            --opta-primary: #8b5cf6;
            --opta-primary-glow: #a855f7;
            --opta-text-primary: #fafafa;
            --opta-text-secondary: #a1a1aa;
        }

        body {
            background-color: var(--opta-bg);
            color: var(--opta-text-primary);
            font-family: "Sora", sans-serif;
            margin: 0;
            padding: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
            max-width: 1000px;
            margin-bottom: 3rem;
        }

        .header svg {
            color: var(--opta-text-primary);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.02em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--opta-border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.15) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.4);
        }

        .card:hover::before {
            opacity: 1;
        }

        .icon-wrap {
            background: rgba(255, 255, 255, 0.03);
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            color: var(--opta-text-secondary);
            z-index: 1;
            transition: color 0.3s, background 0.3s, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card:hover .icon-wrap {
            color: var(--opta-primary-glow);
            background: rgba(139, 92, 246, 0.1);
            transform: scale(1.1);
        }

        .title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--opta-text-primary);
            margin-bottom: 0.5rem;
            z-index: 1;
        }

        .desc {
            font-size: 0.75rem;
            color: var(--opta-text-secondary);
            line-height: 1.5;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="header">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
                d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
            <circle cx="12" cy="12" r="3" />
        </svg>
        <h1>Opta Settings</h1>
    </div>
    <div class="grid">
        <div class="card">
            <div class="icon-wrap">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8l-6 6v12a2 2 0 0 0 2 2z" />
                    <line x1="14" y1="2" x2="14" y2="22" />
                    <line x1="4" y1="12" x2="14" y2="12" />
                </svg>
            </div>
            <div class="title">General</div>
            <div class="desc">App preferences, file behavior, and updates</div>
        </div>

        <div class="card">
            <div class="icon-wrap">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 16v-4" />
                    <path d="M12 8h.01" />
                </svg>
            </div>
            <div class="title">Intelligence</div>
            <div class="desc">LMX Engine bindings, default models, and context</div>
        </div>

        <div class="card">
            <div class="icon-wrap">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242" />
                    <path d="M12 12v9" />
                    <path d="M8 17l4 4 4-4" />
                </svg>
            </div>
            <div class="title">Connection</div>
            <div class="desc">Daemon remote host logic and HTTP/WS sockets</div>
        </div>

        <div class="card">
            <div class="icon-wrap">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path
                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                    <polyline points="3.29 7 12 12 20.71 7" />
                    <line x1="12" y1="22" x2="12" y2="12" />
                </svg>
            </div>
            <div class="title">Interface</div>
            <div class="desc">Widget grids, typography, and visual bounds</div>
        </div>
    </div>
</body>

</html>
