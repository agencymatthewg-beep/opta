<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opta Code - Telemetry Dashboard (Neon Nodes)</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #09090b;
    --surface: #0c0c12;
    --violet: #a855f7;
    --green: #22c55e;
    --cyan: #06b6d4;
    --red: #ef4444;
    --text-pri: #fafafa;
    --text-sec: #a1a1aa;
    --text-mut: #52525b;
    --obsidian: rgba(5,3,10,0.8);
    --border: rgba(255,255,255,0.08);
  }
  body {
    background-color: var(--void);
    color: var(--text-pri);
    font-family: 'Sora', sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    /* Simulate a right-hand sidebar */
    justify-content: flex-end; 
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 32px 32px;
  }

  .telemetry-panel {
    width: 380px;
    height: 100%;
    background: var(--obsidian);
    border-left: 1px solid var(--border);
    backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    box-shadow: -20px 0 40px rgba(0,0,0,0.5);
  }

  .header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }
  .title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--violet);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green);
  }
  h2 { margin: 8px 0 0 0; font-size: 18px; }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  /* Hardware Meters */
  .meter-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .meter {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 12px;
  }
  .meter-header {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-sec);
    margin-bottom: 8px;
  }
  .meter-val { color: var(--text-pri); }
  .bar-bg {
    height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
  }
  .bar-fill {
    height: 100%; background: var(--violet); box-shadow: 0 0 10px var(--violet); width: 65%;
  }

  /* Agent Tree */
  .section-title {
    font-size: 12px; color: var(--text-mut); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; margin-bottom: 16px;
  }
  .tree-node {
    display: flex;
    gap: 16px;
    position: relative;
    margin-bottom: 16px;
  }
  /* Tree Line */
  .tree-node:not(:last-child)::after {
    content: ''; position: absolute; left: 11px; top: 24px; bottom: -16px; width: 1px; background: var(--border);
  }

  .node-icon {
    width: 24px; height: 24px; border-radius: 6px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
    display: flex; align-items: center; justify-content: center; position: relative; z-index: 2;
  }
  .node-icon svg { stroke: var(--green); width: 12px; height: 12px; }
  
  .node-icon.sub { background: rgba(6,182,212,0.1); border-color: rgba(6,182,212,0.3); }
  .node-icon.sub svg { stroke: var(--cyan); }

  .node-icon.supervisor { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); }
  .node-icon.supervisor svg { stroke: var(--amber); }

  .node-info { flex: 1; }
  .node-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .node-phase { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-sec); display: flex; align-items: center; gap: 6px; }
  
  .spinner {
    width: 10px; height: 10px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--text-pri); border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>

<div class="telemetry-panel">
  <div class="header">
    <div class="title"><span class="live-dot"></span> Telemetry Stream</div>
    <h2>Session Runtime</h2>
  </div>

  <div class="content">
    
    <div class="meter-group">
      <div class="meter">
        <div class="meter-header"><span>VRAM UTILIZATION</span><span class="meter-val">22.4 / 32 GB</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:70%"></div></div>
      </div>
      <div class="meter">
        <div class="meter-header"><span>TOKEN SPEED</span><span class="meter-val">34.2 t/s</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:85%; background: var(--green); box-shadow: 0 0 10px var(--green);"></div></div>
      </div>
    </div>

    <div>
      <div class="section-title">Execution Graph</div>
      
      <div class="tree-node">
        <div class="node-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <div class="node-info">
          <div class="node-name">Main Agent (Do)</div>
          <div class="node-phase">Waiting for sub-agent...</div>
        </div>
      </div>

      <div class="tree-node" style="margin-left: 20px;">
        <div class="node-icon sub">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        </div>
        <div class="node-info">
          <div class="node-name">Research Sub-agent</div>
          <div class="node-phase"><div class="spinner"></div> Executing tool: <span style="color:var(--cyan)">web_search</span></div>
        </div>
      </div>

      <div class="tree-node">
        <div class="node-icon supervisor">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3-9 5 18 3-9h5"/></svg>
        </div>
        <div class="node-info">
          <div class="node-name">ATPO Supervisor</div>
          <div class="node-phase" style="color:var(--amber)">Analyzed 4 context loops.</div>
        </div>
      </div>

    </div>

  </div>
</div>

</body>
</html>
