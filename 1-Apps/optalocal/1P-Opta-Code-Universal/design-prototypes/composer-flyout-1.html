<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opta Code - Composer Overrides (Glass Dropdown)</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #09090b;
    --surface: #0c0c12;
    --violet: #a855f7;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --text-pri: #fafafa;
    --text-sec: #a1a1aa;
    --text-mut: #52525b;
    --glass-bg: rgba(12, 12, 18, 0.85);
    --glass-border: rgba(255, 255, 255, 0.1);
  }
  body {
    background-color: var(--void);
    color: var(--text-pri);
    font-family: 'Sora', sans-serif;
    margin: 0;
    padding: 4rem;
    display: flex;
    justify-content: center;
    align-items: flex-end; /* Push to bottom like a chat bar */
    height: 100vh;
    box-sizing: border-box;
    background-image: radial-gradient(circle at 50% 100%, rgba(168, 85, 247, 0.1) 0%, var(--void) 50%);
  }

  .composer-container {
    width: 100%;
    max-width: 800px;
    position: relative;
  }

  /* The actual chat input bar */
  .composer-bar {
    background: var(--surface);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 10;
    position: relative;
  }
  
  .composer-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-pri);
    font-family: 'Sora';
    font-size: 15px;
    outline: none;
  }

  .options-toggle {
    background: rgba(168,85,247,0.1);
    border: 1px solid rgba(168,85,247,0.3);
    color: var(--violet);
    padding: 6px 12px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .options-toggle:hover { background: rgba(168,85,247,0.2); }
  
  /* The Flyout Menu */
  .flyout-menu {
    position: absolute;
    bottom: calc(100% + 12px);
    right: 0;
    width: 320px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    backdrop-filter: blur(24px);
    box-shadow: 0 -8px 40px rgba(0,0,0,0.4);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transform: translateY(0);
    opacity: 1;
  }

  .menu-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-mut);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Segmented Control for Mode */
  .segmented-control {
    display: flex;
    background: rgba(0,0,0,0.4);
    border-radius: 8px;
    padding: 4px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .segment {
    flex: 1;
    text-align: center;
    padding: 6px 0;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sec);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .segment.active {
    background: rgba(255,255,255,0.1);
    color: var(--text-pri);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  /* Dropdown Select for Model */
  .custom-select {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-pri);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    appearance: none; /* Hide default arrow */
    cursor: pointer;
  }

  /* Toggle Switch */
  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: rgba(239, 68, 68, 0.05); /* Subtle red tint */
    border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: 8px;
  }
  .toggle-label {
    font-size: 13px;
    color: var(--red);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .switch {
    width: 36px; height: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
  }
  .switch::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: var(--text-sec);
    border-radius: 50%;
    transition: all 0.2s;
  }
  .toggle-row.active .switch { background: var(--red); }
  .toggle-row.active .switch::after { transform: translateX(16px); background: #fff; }

</style>
</head>
<body>

<div class="composer-container">
  
  <div class="flyout-menu">
    
    <div class="menu-section">
      <div class="section-label">Execution Mode</div>
      <div class="segmented-control">
        <div class="segment">Chat</div>
        <div class="segment active" style="color:var(--violet)">Do</div>
        <div class="segment">Plan</div>
        <div class="segment">Research</div>
      </div>
    </div>

    <div class="menu-section">
      <div class="section-label">Model Override</div>
      <select class="custom-select">
        <option>LMX: Qwen-2.5-Coder-7B</option>
        <option>Anthropic: claude-3-5-sonnet</option>
        <option>Local: llama-3-8b-instruct</option>
      </select>
    </div>

    <div class="menu-section">
      <div class="toggle-row">
        <div class="toggle-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
          Dangerous Mode (L4)
        </div>
        <div class="switch"></div>
      </div>
      <div style="font-size:10px; color:var(--text-mut); margin-left:4px;">Bypasses permission prompts for system changes.</div>
    </div>

  </div>

  <div class="composer-bar">
    <div style="color:var(--violet); font-weight:700; font-size:18px;">+</div>
    <input type="text" class="composer-input" placeholder="What do you want to build?">
    <button class="options-toggle">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
      Overrides (2)
    </button>
  </div>
</div>

</body>
</html>
