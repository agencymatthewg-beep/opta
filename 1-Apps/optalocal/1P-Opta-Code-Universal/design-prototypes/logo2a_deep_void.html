<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opta Code Logo - 2A: Deep Void Hexagon</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap");
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #09090b; font-family: "JetBrains Mono", monospace; overflow: hidden; }
        .canvas { position: relative; width: 400px; height: 400px; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(168, 85, 247, 0.1) 0%, transparent 70%); }
        
        .grid {
            position: absolute; inset: 0;
            background-size: 20px 20px;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.01) 1px, transparent 1px);
        }

        /* Base Hexagon */
        .hex-layer {
            position: absolute;
            display: flex; justify-content: center; align-items: center;
        }

        .hex-outer {
            width: 180px; height: 207.84px; /* 180 * 1.1547 */
            background: rgba(9, 9, 11, 0.9);
            border-left: 2px solid rgba(168, 85, 247, 0.5);
            border-right: 2px solid rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.15);
            animation: pulse-border 4s infinite alternate;
        }
        .hex-outer::before, .hex-outer::after {
            content: ''; position: absolute; z-index: -1; width: 100%; height: 100%; box-sizing: border-box;
            border-left: 2px solid rgba(168, 85, 247, 0.5); border-right: 2px solid rgba(168, 85, 247, 0.5);
        }
        .hex-outer::before { transform: rotate(60deg); }
        .hex-outer::after { transform: rotate(-60deg); }

        /* Inner Hexagon 1 */
        .hex-inner-1 {
            width: 140px; height: 161.65px;
            border-left: 1px dashed #06b6d4;
            border-right: 1px dashed #06b6d4;
            animation: spin-hex 20s linear infinite;
        }
        .hex-inner-1::before, .hex-inner-1::after {
            content: ''; position: absolute; width: 100%; height: 100%; box-sizing: border-box;
            border-left: 1px dashed #06b6d4; border-right: 1px dashed #06b6d4;
        }
        .hex-inner-1::before { transform: rotate(60deg); }
        .hex-inner-1::after { transform: rotate(-60deg); }

        /* Inner Hexagon 2 */
        .hex-inner-2 {
            width: 100px; height: 115.47px;
            border-left: 2px solid rgba(168, 85, 247, 0.8);
            border-right: 2px solid rgba(168, 85, 247, 0.8);
            animation: spin-hex-reverse 15s linear infinite;
        }
        .hex-inner-2::before, .hex-inner-2::after {
            content: ''; position: absolute; width: 100%; height: 100%; box-sizing: border-box;
            border-left: 2px solid rgba(168, 85, 247, 0.8); border-right: 2px solid rgba(168, 85, 247, 0.8);
        }
        .hex-inner-2::before { transform: rotate(60deg); }
        .hex-inner-2::after { transform: rotate(-60deg); }

        .core-flare {
            position: absolute;
            width: 80px; height: 80px;
            background: radial-gradient(circle at center, rgba(168, 85, 247, 0.4) 0%, transparent 70%);
            animation: breathe 2s ease-in-out infinite alternate;
        }

        .code-mark {
            z-index: 10;
            width: 60px; height: 60px;
            filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.8));
        }

        @keyframes pulse-border {
            0% { border-color: rgba(168, 85, 247, 0.3); }
            100% { border-color: rgba(168, 85, 247, 1); box-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }
        }
        @keyframes spin-hex { 100% { transform: rotate(360deg); } }
        @keyframes spin-hex-reverse { 100% { transform: rotate(-360deg); } }
        @keyframes breathe {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .label {
            position: absolute; bottom: -50px;
            color: #fafafa;
            font-size: 1.4rem; font-weight: 700;
            text-shadow: 0 0 10px rgba(168,85,247,0.5);
            letter-spacing: 0.3rem;
        }
        .label span { color: #06b6d4; }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="grid"></div>
        
        <div class="hex-layer hex-outer"></div>
        <div class="hex-layer hex-inner-1"></div>
        <div class="hex-layer hex-inner-2"></div>
        
        <div class="core-flare"></div>
        <svg class="code-mark" viewBox="0 0 200 200" fill="none">
            <g filter="url(#glow)">
                <path d="M100 20 L20 180 L180 180 ZM60 140 L100 60 L140 140 Z" fill="#06b6d4" />
            </g>
            <defs>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="15" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>
        </svg>
        <div class="label">OPTA<span>_</span>CODE</div>
    </div>
</body>
</html>
