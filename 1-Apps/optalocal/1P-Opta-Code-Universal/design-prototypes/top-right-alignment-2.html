<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Right Alignment - Concept 2: Widget Header Integration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --opta-bg: #09090b;
            --opta-primary-glow: #a855f7;
            --opta-text-primary: #fafafa;
            --opta-text-secondary: #a1a1aa;
            --opta-text-muted: #52525b;
        }

        body {
            margin: 0;
            background: var(--opta-bg);
            color: var(--opta-text-primary);
            font-family: 'Sora', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .v1-topbar {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 0 1.5rem;
        }

        .v1-logo-text {
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .v1-body {
            flex: 1;
            display: flex;
        }

        .main-chat {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--opta-text-muted);
            font-family: 'JetBrains Mono';
            padding: 2rem;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* CONCEPT 2: WIDGET HEADER INTEGRATION */
        .widget-pane {
            width: 320px;
            display: flex;
            flex-direction: column;
        }

        .wp-controls {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            background: rgba(255, 255, 255, 0.01);
        }

        .v1-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.03);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.35rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            color: var(--opta-text-secondary);
            font-family: 'Sora', sans-serif;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .v1-btn:hover {
            color: var(--opta-text-primary);
            background: rgba(168, 85, 247, 0.1);
            border-color: var(--opta-primary-glow);
            transform: translateY(-1px) scale(1.02);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.15);
        }

        .v1-btn svg {
            width: 14px;
            height: 14px;
            color: var(--opta-primary-glow);
        }

        .wp-dummy-content {
            flex: 1;
            padding: 1rem;
            font-family: 'JetBrains Mono';
            font-size: 0.7rem;
            color: var(--opta-text-secondary);
        }
    </style>
</head>

<body>
    <header class="v1-topbar">
        <div class="v1-logo-text">OPTA CODE</div>
        <!-- No buttons in topbar right side -->
        <div class="v1-top-right"></div>
    </header>
    <div class="v1-body">
        <div class="main-chat">
            Concept 2:<br>Buttons moved to the Widget Pane header. Removes clutter from the main topbar and visually
            groups "app controls" in the side panel.
        </div>
        <aside class="widget-pane">
            <div class="wp-controls">
                <button class="v1-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </svg>
                    <span>TILES</span>
                </button>
                <button class="v1-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <span>ACCOUNTS</span>
                </button>
            </div>
            <div class="wp-dummy-content">
                [Widget Area]
            </div>
        </aside>
    </div>
</body>

</html>
