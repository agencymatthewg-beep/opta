<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opta Code Logo - Dynamic Orbit</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap");
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #09090b; font-family: "JetBrains Mono", monospace;}
        .canvas { position: relative; width: 400px; height: 400px; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, rgba(168, 85, 247, 0.1) 0%, transparent 60%); }
        
        .orbit-container {
            position: absolute;
            width: 260px; height: 260px;
            animation: slowSpin 30s linear infinite;
        }

        .ring { 
            position: absolute; 
            inset: 0; 
            border: 2px solid rgba(168, 85, 247, 0.2); 
            border-radius: 50%;
        }

        .ring-inner {
            position: absolute;
            inset: 15%;
            border: 1px dashed rgba(6, 182, 212, 0.4);
            border-radius: 50%;
            animation: slowSpinReverse 20s linear infinite;
        }

        .orbit-axis {
            position: absolute;
            inset: -15%;
            border: 1px solid rgba(168, 85, 247, 0.4); 
            border-radius: 50%;
            transform: rotateX(65deg) rotateY(15deg);
            transform-style: preserve-3d;
            animation: axesSpin 12s linear infinite;
        }
        
        .node {
            position: absolute; width: 8px; height: 8px; border-radius: 50%;
            background: #a855f7; box-shadow: 0 0 12px #a855f7;
            top: 50%; left: -4px; transform: translateY(-50%);
        }

        .node-sec {
            position: absolute; width: 6px; height: 6px; border-radius: 50%;
            background: #06b6d4; box-shadow: 0 0 10px #06b6d4;
            left: 50%; top: -3px; transform: translateX(-50%);
        }

        .core-glyph {
            position: absolute;
            z-index: 10;
            width: 100px; height: 100px;
            display: flex; justify-content: center; align-items: center;
        }

        .core-glyph svg {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.5));
            animation: pulseShape 4s ease-in-out infinite alternate;
        }

        @keyframes pulseShape {
            0% { transform: scale(0.95); opacity: 0.9; filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.4)); }
            100% { transform: scale(1.05); opacity: 1; filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.8)); }
        }

        @keyframes slowSpin { 100% { transform: rotate(360deg); } }
        @keyframes slowSpinReverse { 100% { transform: rotate(-360deg); } }
        @keyframes axesSpin { 
            0% { transform: rotateX(65deg) rotateY(15deg) rotateZ(0deg); }
            100% { transform: rotateX(65deg) rotateY(15deg) rotateZ(360deg); }
        }

        .label {
            position: absolute;
            bottom: -60px;
            color: #fafafa;
            letter-spacing: 0.2em;
            font-size: 1.2rem;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(168,85,247,0.5);
        }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="orbit-container">
            <div class="ring"></div>
            <div class="ring-inner"></div>
            <div class="orbit-axis"><div class="node"></div><div class="node-sec"></div></div>
        </div>
        <div class="core-glyph">
            <!-- Terminal code concept -->
            <svg viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 18 22 12 16 6"></polyline>
                <polyline points="8 6 2 12 8 18"></polyline>
                <line x1="10" y1="20" x2="14" y2="4"></line>
            </svg>
        </div>
        <div class="label">OPTA CODE</div>
    </div>
</body>
</html>
