<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concept 1: Zen IDE Terminal</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --void: #09090b;
            --surface: #0c0c12;
            --elevated: #1a1a24;
            --violet: #a855f7;
            --cyan: #06b6d4;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--void);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar-minimized {
            width: 60px;
            background: var(--surface);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 0;
            gap: 2rem;
        }

        .icon-btn {
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover,
        .icon-btn.active {
            color: var(--cyan);
        }

        .main-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        .timeline {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .msg-user {
            align-self: flex-end;
            background: var(--elevated);
            border-left: 3px solid var(--violet);
        }

        .msg-ai {
            align-self: flex-start;
            border-left: 3px solid var(--cyan);
            background: rgba(6, 182, 212, 0.05);
        }

        .composer-area {
            margin-top: 1rem;
        }

        .composer {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            transition: 0.3s border-color;
        }

        .composer:focus-within {
            border-color: var(--cyan);
        }

        input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            width: 100%;
            outline: none;
        }

        .code-block {
            background: var(--void);
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="sidebar-minimized">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none"
            style="margin-top: 4px; filter: drop-shadow(0 0 6px rgba(168,85,247,0.4))">
            <path d="M 32 14 A 14 14 0 1 0 32 34" stroke="#a855f7" stroke-width="3" stroke-linecap="round" />
            <line x1="16" y1="36" x2="36" y2="12" stroke="#a855f7" stroke-width="3" stroke-linecap="round" />
        </svg>
        <i data-lucide="cpu" class="icon-btn"></i>
        <i data-lucide="settings" class="icon-btn" style="margin-top: auto;"></i>
    </div>
    <div class="main-col">
        <div class="timeline">
            <div class="message msg-user">Fix the logic in the authentication handler to use the new daemon token.</div>
            <div class="message msg-ai">
                <div>[SYSTEM] Updating target file: src/auth.ts</div>
                <div class="code-block">
                    <span style="color:var(--violet)">const</span> token = daemon.getToken();<br>
                    <span style="color:var(--cyan)">await</span> auth.verify(token);
                </div>
            </div>
        </div>
        <div class="composer-area">
            <div class="composer">
                <i data-lucide="zap" style="color:var(--cyan)"></i>
                <input type="text" placeholder="Type a command or task for the agent...">
                <i data-lucide="send" class="icon-btn"></i>
            </div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>

</html>
