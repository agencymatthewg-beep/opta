<svg width="210" height="210" viewBox="0 0 210 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="discClip">
      <circle cx="105" cy="105" r="87"/>
    </clipPath>
    <filter id="rg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="bloom" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="rayg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="bg" x="-100%" y="-60%" width="300%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <!-- Radial fog — clears toward edges so binary field fills the disc -->
    <radialGradient id="matrixFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#09090b" stop-opacity="0.68"/>
      <stop offset="22%"  stop-color="#09090b" stop-opacity="0.40"/>
      <stop offset="48%"  stop-color="#09090b" stop-opacity="0.08"/>
      <stop offset="70%"  stop-color="#09090b" stop-opacity="0.01"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="voidFill" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#100e18"/>
      <stop offset="60%"  stop-color="#0c0a14"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <linearGradient id="ringH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c084fc" stop-opacity=".9"/>
      <stop offset="25%"  stop-color="#a855f7" stop-opacity=".7"/>
      <stop offset="55%"  stop-color="#7c3aed" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity=".15"/>
    </linearGradient>
    <radialGradient id="cb" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#d8b4fe" stop-opacity=".9"/>
      <stop offset="40%"  stop-color="#a855f7" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og" cx="50%" cy="50%" r="50%">
      <stop offset="70%"  stop-color="#a855f7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity=".05"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="105" cy="105" r="100" fill="url(#og)"/>
  <circle cx="105" cy="105" r="88"  fill="url(#voidFill)"/>

  <!-- Binary field — concentric rings clipped to disc, densest at edge -->
  <g clip-path="url(#discClip)" font-family="'JetBrains Mono','Courier New',monospace" font-size="7" text-anchor="middle">
    <!-- Outermost ring r≈72 -->
    <text x="105" y="36"  fill="#7c3aed" opacity=".55">1</text>
    <text x="133" y="41"  fill="#8b5cf6" opacity=".50">0</text>
    <text x="154" y="60"  fill="#7c3aed" opacity=".52">1</text>
    <text x="162" y="86"  fill="#8b5cf6" opacity=".58">0</text>
    <text x="162" y="112" fill="#7c3aed" opacity=".56">1</text>
    <text x="154" y="138" fill="#8b5cf6" opacity=".50">0</text>
    <text x="133" y="158" fill="#7c3aed" opacity=".48">1</text>
    <text x="105" y="168" fill="#8b5cf6" opacity=".55">0</text>
    <text x="77"  y="158" fill="#7c3aed" opacity=".50">1</text>
    <text x="56"  y="138" fill="#8b5cf6" opacity=".52">0</text>
    <text x="48"  y="112" fill="#7c3aed" opacity=".58">1</text>
    <text x="48"  y="86"  fill="#8b5cf6" opacity=".55">0</text>
    <text x="56"  y="60"  fill="#7c3aed" opacity=".50">1</text>
    <text x="77"  y="41"  fill="#8b5cf6" opacity=".46">0</text>
    <!-- Mid ring r≈56 -->
    <text x="105" y="51"  fill="#9333ea" opacity=".44">0</text>
    <text x="127" y="57"  fill="#8b5cf6" opacity=".40">1</text>
    <text x="144" y="74"  fill="#9333ea" opacity=".43">0</text>
    <text x="149" y="96"  fill="#8b5cf6" opacity=".46">1</text>
    <text x="148" y="118" fill="#9333ea" opacity=".44">0</text>
    <text x="139" y="138" fill="#8b5cf6" opacity=".40">1</text>
    <text x="122" y="152" fill="#9333ea" opacity=".39">0</text>
    <text x="105" y="157" fill="#8b5cf6" opacity=".43">1</text>
    <text x="88"  y="152" fill="#9333ea" opacity=".41">0</text>
    <text x="71"  y="138" fill="#8b5cf6" opacity=".40">1</text>
    <text x="62"  y="118" fill="#9333ea" opacity=".43">0</text>
    <text x="61"  y="96"  fill="#8b5cf6" opacity=".45">1</text>
    <text x="66"  y="74"  fill="#9333ea" opacity=".40">0</text>
    <text x="83"  y="57"  fill="#8b5cf6" opacity=".38">1</text>
    <!-- Inner ring r≈38 — subtlest, near glyph -->
    <text x="105" y="68"  fill="#a855f7" opacity=".27">1</text>
    <text x="119" y="71"  fill="#9333ea" opacity=".24">0</text>
    <text x="130" y="83"  fill="#a855f7" opacity=".26">1</text>
    <text x="133" y="98"  fill="#9333ea" opacity=".27">0</text>
    <text x="131" y="114" fill="#a855f7" opacity=".25">1</text>
    <text x="122" y="127" fill="#9333ea" opacity=".23">0</text>
    <text x="109" y="135" fill="#a855f7" opacity=".25">1</text>
    <text x="95"  y="136" fill="#9333ea" opacity=".24">0</text>
    <text x="83"  y="129" fill="#a855f7" opacity=".23">1</text>
    <text x="75"  y="116" fill="#9333ea" opacity=".24">0</text>
    <text x="73"  y="100" fill="#a855f7" opacity=".27">1</text>
    <text x="77"  y="84"  fill="#9333ea" opacity=".23">0</text>
    <text x="88"  y="72"  fill="#a855f7" opacity=".22">1</text>
    <!-- Inter-ring scatter -->
    <text x="120" y="44"  fill="#7c3aed" opacity=".34">1</text>
    <text x="91"  y="44"  fill="#8b5cf6" opacity=".30">0</text>
    <text x="161" y="100" fill="#7c3aed" opacity=".38">1</text>
    <text x="49"  y="100" fill="#8b5cf6" opacity=".38">0</text>
    <text x="151" y="72"  fill="#7c3aed" opacity=".34">1</text>
    <text x="58"  y="130" fill="#8b5cf6" opacity=".34">0</text>
    <text x="155" y="128" fill="#7c3aed" opacity=".36">1</text>
    <text x="57"  y="74"  fill="#8b5cf6" opacity=".32">1</text>
    <!-- Mid-field gap fill -->
    <text x="115" y="46"  fill="#9333ea" opacity=".30">0</text>
    <text x="140" y="55"  fill="#8b5cf6" opacity=".32">1</text>
    <text x="158" y="80"  fill="#9333ea" opacity=".35">0</text>
    <text x="158" y="122" fill="#8b5cf6" opacity=".34">1</text>
    <text x="140" y="148" fill="#9333ea" opacity=".31">0</text>
    <text x="115" y="162" fill="#8b5cf6" opacity=".30">1</text>
    <text x="95"  y="162" fill="#9333ea" opacity=".30">0</text>
    <text x="70"  y="148" fill="#8b5cf6" opacity=".32">1</text>
    <text x="52"  y="122" fill="#9333ea" opacity=".35">0</text>
    <text x="52"  y="80"  fill="#8b5cf6" opacity=".33">1</text>
    <text x="70"  y="55"  fill="#9333ea" opacity=".30">0</text>
    <text x="95"  y="46"  fill="#8b5cf6" opacity=".29">1</text>
    <!-- Outer ring r≈82 — fills disc to the edge -->
    <text x="105" y="26"  fill="#7c3aed" opacity=".60">1</text>
    <text x="136" y="30"  fill="#8b5cf6" opacity=".55">0</text>
    <text x="163" y="47"  fill="#7c3aed" opacity=".58">1</text>
    <text x="183" y="75"  fill="#8b5cf6" opacity=".62">0</text>
    <text x="187" y="105" fill="#7c3aed" opacity=".64">1</text>
    <text x="183" y="135" fill="#8b5cf6" opacity=".60">0</text>
    <text x="163" y="163" fill="#7c3aed" opacity=".57">1</text>
    <text x="136" y="180" fill="#8b5cf6" opacity=".54">0</text>
    <text x="105" y="186" fill="#7c3aed" opacity=".60">1</text>
    <text x="74"  y="180" fill="#8b5cf6" opacity=".55">0</text>
    <text x="47"  y="163" fill="#7c3aed" opacity=".58">1</text>
    <text x="27"  y="135" fill="#8b5cf6" opacity=".62">0</text>
    <text x="23"  y="105" fill="#7c3aed" opacity=".64">1</text>
    <text x="27"  y="75"  fill="#8b5cf6" opacity=".60">0</text>
    <text x="47"  y="47"  fill="#7c3aed" opacity=".57">1</text>
    <text x="74"  y="30"  fill="#8b5cf6" opacity=".54">0</text>
    <!-- Interstitial outer bits at off-angles -->
    <text x="122" y="27"  fill="#a855f7" opacity=".48">0</text>
    <text x="88"  y="27"  fill="#9333ea" opacity=".47">1</text>
    <text x="152" y="38"  fill="#a855f7" opacity=".52">1</text>
    <text x="175" y="62"  fill="#9333ea" opacity=".53">0</text>
    <text x="185" y="90"  fill="#a855f7" opacity=".56">1</text>
    <text x="185" y="120" fill="#9333ea" opacity=".54">0</text>
    <text x="174" y="148" fill="#a855f7" opacity=".51">1</text>
    <text x="151" y="172" fill="#9333ea" opacity=".50">0</text>
    <text x="122" y="183" fill="#a855f7" opacity=".48">1</text>
    <text x="88"  y="183" fill="#9333ea" opacity=".48">0</text>
    <text x="59"  y="172" fill="#a855f7" opacity=".50">1</text>
    <text x="36"  y="148" fill="#9333ea" opacity=".52">0</text>
    <text x="25"  y="120" fill="#a855f7" opacity=".55">1</text>
    <text x="25"  y="90"  fill="#9333ea" opacity=".54">0</text>
    <text x="35"  y="62"  fill="#a855f7" opacity=".51">1</text>
    <text x="58"  y="38"  fill="#9333ea" opacity=".50">0</text>
  </g>

  <!-- Radial fog — clears the glyph centre -->
  <circle cx="105" cy="105" r="87" fill="url(#matrixFade)" clip-path="url(#discClip)"/>

  <!-- Orbit rings -->
  <circle cx="105" cy="105" r="96" stroke="#a855f7" stroke-width="6"   stroke-opacity=".06" fill="none"/>
  <circle cx="105" cy="105" r="93" stroke="#a855f7" stroke-width="3"   stroke-opacity=".10" fill="none"/>
  <circle cx="105" cy="105" r="90" stroke="url(#ringH)" stroke-width="1.6" fill="none" filter="url(#rg)"/>
  <circle cx="105" cy="105" r="87" stroke="#a855f7" stroke-width=".6"  stroke-opacity=".12" fill="none"/>

  <g transform="translate(105,105)">
    <!-- Attention rays — weighted by thickness -->
    <g filter="url(#rayg)">
      <line x1="0"   y1="-40" x2="0"   y2="0" stroke="#c084fc" stroke-width="2.2" stroke-linecap="round" opacity=".9"/>
      <line x1="28"  y1="-28" x2="0"   y2="0" stroke="#a855f7" stroke-width="1.4" stroke-linecap="round" opacity=".65"/>
      <line x1="40"  y1="0"   x2="0"   y2="0" stroke="#7c3aed" stroke-width=".8"  stroke-linecap="round" opacity=".45"/>
      <line x1="28"  y1="28"  x2="0"   y2="0" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round" opacity=".75"/>
      <line x1="0"   y1="40"  x2="0"   y2="0" stroke="#c084fc" stroke-width="1.2" stroke-linecap="round" opacity=".55"/>
      <line x1="-28" y1="28"  x2="0"   y2="0" stroke="#a855f7" stroke-width=".6"  stroke-linecap="round" opacity=".35"/>
      <line x1="-40" y1="0"   x2="0"   y2="0" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" opacity=".85"/>
      <line x1="-28" y1="-28" x2="0"   y2="0" stroke="#a855f7" stroke-width="1.0" stroke-linecap="round" opacity=".5"/>
    </g>
    <!-- Token nodes on query/key orbit -->
    <g filter="url(#glow)">
      <circle cx="0"   cy="-40" r="3"   fill="#e9d5ff" opacity=".9"/>
      <circle cx="28"  cy="-28" r="2.2" fill="#c084fc" opacity=".7"/>
      <circle cx="40"  cy="0"   r="1.8" fill="#a855f7" opacity=".5"/>
      <circle cx="28"  cy="28"  r="2.5" fill="#c084fc" opacity=".8"/>
      <circle cx="0"   cy="40"  r="2"   fill="#a855f7" opacity=".6"/>
      <circle cx="-28" cy="28"  r="1.6" fill="#7c3aed" opacity=".45"/>
      <circle cx="-40" cy="0"   r="3.2" fill="#e9d5ff" opacity=".9"/>
      <circle cx="-28" cy="-28" r="2"   fill="#a855f7" opacity=".55"/>
    </g>
    <!-- { } coding braces -->
    <g filter="url(#bg)" opacity=".58">
      <path d="M-18 -14 C-22 -14,-24 -10,-24 -6 L-24 -2 C-24 0,-28 0,-28 0 C-28 0,-24 0,-24 2 L-24 6 C-24 10,-22 14,-18 14"
            fill="none" stroke="#c084fc" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g filter="url(#bg)" opacity=".58">
      <path d="M18 -14 C22 -14,24 -10,24 -6 L24 -2 C24 0,28 0,28 0 C28 0,24 0,24 2 L24 6 C24 10,22 14,18 14"
            fill="none" stroke="#c084fc" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- Focal point — attended token -->
    <g filter="url(#bloom)" opacity=".65">
      <circle cx="0" cy="0" r="9" fill="#a855f7"/>
    </g>
    <g filter="url(#glow)">
      <circle cx="0" cy="0" r="6.2" fill="none" stroke="#e9d5ff" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="2.8" fill="#fff" opacity=".95"/>
    </g>
  </g>

  <!-- Centre ambience bloom -->
  <circle cx="105" cy="105" r="46" fill="url(#cb)" fill-opacity=".32"/>
</svg>
