# Opta Content Nodes Registry
# Every content node across all websites and apps that describes Opta apps/features.
# Used by AI to determine what needs updating when a change is made.
# Last updated: 2026-03-04
#
# Fields:
#   id           - unique slug for this content node
#   surface      - which site/app contains it (matches apps.yaml id)
#   file         - repo-relative path to the file
#   describes    - list of app IDs (from apps.yaml) that this content discusses
#   content_type - guide | doc | homepage_section | status_card | release_note |
#                  download_manifest | app_description | feature_registry
#   status       - active | draft | deprecated (default: active)
#   stale_when   - conditions that make this content outdated

content_nodes:

  # ════════════════════════════════════════════════════════════════════════════
