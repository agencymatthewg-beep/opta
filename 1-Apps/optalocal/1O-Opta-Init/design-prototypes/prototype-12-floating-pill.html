<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Opta Init - Prototype 12: Floating Pill</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #000; color: #fff; font-family: 'Sora', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .window { width: 900px; height: 550px; background: #09090b; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    .glow-center { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 60%); pointer-events: none; }
    
    .pill-dock {
      background: rgba(20,20,28,0.7);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      padding: 12px 24px;
      border-radius: 999px;
      display: flex;
      gap: 20px;
      position: absolute;
      bottom: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    
    .app-item { position: relative; cursor: pointer; display: flex; justify-content: center; align-items: center; }
    
    .purple-circle {
      position: absolute;
      width: 70px; height: 70px; border-radius: 50%;
      background: #a855f7;
      opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 20px rgba(168,85,247,0.8);
      z-index: 1; pointer-events: none; transform: scale(0.5);
    }
    
    .app-logo { width: 48px; height: 48px; border-radius: 50%; z-index: 2; transition: all 0.3s; background: #09090b; }
    
    .tooltip {
      position: absolute; top: -45px; background: #fff; color: #000; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 700; opacity: 0; transform: translateY(10px); transition: all 0.2s; pointer-events: none; white-space: nowrap;
    }
    .tooltip::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); border-width: 5px 5px 0; border-style: solid; border-color: #fff transparent transparent transparent; }

    .app-item:hover .purple-circle { opacity: 0.6; transform: scale(1.1); }
    .app-item:hover .app-logo { transform: translateY(-8px) scale(1.1); }
    .app-item:hover .tooltip { opacity: 1; transform: translateY(-8px); }
    
    .hero-text { text-align: center; z-index: 10; margin-top: -60px; }

  </style>
</head>
<body>
  <div class="window">
    <div class="glow-center"></div>
    
    <div class="hero-text">
      <div class="inline-block border border-purple-500/30 bg-purple-500/10 text-purple-400 px-4 py-1.5 rounded-full text-xs font-mono font-bold tracking-widest mb-6">OPTA DESKTOP</div>
      <h1 class="text-4xl font-bold mb-4">Orchestrate Your Local AI</h1>
      <p class="text-gray-400 max-w-md mx-auto">Select an application from the dock to launch, update, or manage its local daemon state.</p>
    </div>

    <div class="pill-dock">
      <div class="app-item">
        <div class="tooltip">Opta LMX</div>
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-LMX/opta-lmx-logo-final.png" class="app-logo">
      </div>
      <div class="app-item">
        <div class="tooltip">Opta CLI</div>
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-CLI/opta-cli-logo-final.png" class="app-logo">
      </div>
      <div class="app-item">
        <div class="tooltip">Opta Code</div>
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-Code-Desktop/opta-code-logo-final.png" class="app-logo">
      </div>
      <div class="app-item">
        <div class="tooltip">Opta Accounts</div>
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-Accounts/opta-accounts-logo-final.png" class="app-logo">
      </div>
      <div class="app-item">
        <div class="tooltip">Settings</div>
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta/opta-logo.png" class="app-logo">
      </div>
    </div>
  </div>
</body>
</html>
