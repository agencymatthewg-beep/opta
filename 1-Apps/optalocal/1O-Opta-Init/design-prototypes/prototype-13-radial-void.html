<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Opta Init - Prototype 13: Radial Void</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { background: #000; color: #fff; font-family: 'Sora', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    
    .window { 
      width: 1000px; height: 650px; 
      background: radial-gradient(ellipse at center, #0d0c14 0%, #09090b 70%); 
      border: 1px solid rgba(255,255,255,0.05); 
      border-radius: 16px; 
      display: flex; 
      position: relative; 
      overflow: hidden; 
      box-shadow: 0 40px 80px rgba(0,0,0,0.9); 
    }
    
    /* Background Canvas for Particle Field */
    #void-canvas {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .sidebar { width: 120px; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 10; position: relative; background: transparent; }
    
    .main-area { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; position: relative; z-index: 10; }
    
    /* The Arc Container */
    .arc-container {
      position: absolute;
      top: 50%;
      left: 120px;
      transform: translateY(-50%);
      height: 600px;
      width: 300px;
      pointer-events: none;
      z-index: 5;
    }

    .app-item { position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
    
    /* Position apps in an arc along the left edge */
    .pos-1 { top: 10%; left: 0px; }
    .pos-2 { top: 25%; left: 40px; }
    .pos-3 { top: 50%; left: 60px; transform: translateY(-50%); }
    .pos-4 { bottom: 25%; left: 40px; }
    .pos-5 { bottom: 10%; left: 0px; }

    .purple-circle {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.6);
      width: 90px; height: 90px; border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.9) 0%, rgba(168,85,247,0.2) 70%, transparent 100%);
      opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 40px rgba(168,85,247,0.6);
      z-index: 1; pointer-events: none;
    }
    
    .app-logo { width: 64px; height: 64px; border-radius: 50%; object-fit: contain; z-index: 2; transition: all 0.3s; mix-blend-mode: screen; } /* mix-blend-mode to drop background */
    
    .app-item:hover .purple-circle { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
    .app-item:hover .app-logo { transform: scale(1.15); box-shadow: 0 0 20px rgba(168,85,247,0.4); }

    /* Right side info */
    .info-panel { margin-left: auto; max-width: 400px; text-align: right; }
    .status-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(34,197,94,0.1); color: #22c55e; padding: 6px 12px; border-radius: 999px; font-family: 'JetBrains Mono', monospace; font-size: 12px; border: 1px solid rgba(34,197,94,0.3); margin-bottom: 20px; }
    
  </style>
</head>
<body>
  <div class="window">
    <canvas id="void-canvas"></canvas>

    <div class="sidebar">
      <div class="w-8 h-8 rounded-full border-2 border-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.5)] mb-auto"></div>
      <div class="text-xs font-mono text-gray-500 rotate-180" style="writing-mode: vertical-rl; letter-spacing: 0.2em;">OPTA INIT</div>
    </div>
    
    <div class="arc-container">
      <div class="app-item pos-1" onmouseenter="setInfo('Opta LMX', 'The core local inference engine. Manage your models, endpoints, and local API traffic.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-LMX/opta-lmx-logo-final.png" class="app-logo">
      </div>
      <div class="app-item pos-2" onmouseenter="setInfo('Opta CLI', 'Command-line interface for local orchestration, model downloading, and stack management.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-CLI/opta-cli-logo-final.png" class="app-logo">
      </div>
      <div class="app-item pos-3" onmouseenter="setInfo('Opta Code', 'Desktop IDE surface powered by your local LMX endpoints.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-Code-Desktop/opta-code-logo-final.png" class="app-logo">
      </div>
      <div class="app-item pos-4" onmouseenter="setInfo('Opta Accounts', 'Manage your local identity, sync preferences, and configure cloud backups.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-Accounts/opta-accounts-logo-final.png" class="app-logo">
      </div>
      <div class="app-item pos-5" onmouseenter="setInfo('Opta Local', 'Web-based management dashboard for your local LMX environment.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-Local/opta-local-logo-final.png" class="app-logo">
      </div>
    </div>

    <div class="main-area">
      <div class="info-panel">
        <div class="status-badge"><div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> System Ready</div>
        <h1 class="text-5xl font-bold mb-4" id="info-title">Opta Stack</h1>
        <p class="text-gray-400 mb-8 text-lg" id="info-desc">Hover over the orbital arc to interact with your installed tools and runtimes.</p>
        <button class="bg-purple-500 text-white font-bold px-8 py-3 rounded-xl shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:bg-purple-400 transition" id="info-btn">Update All</button>
      </div>
    </div>
  </div>

  <script>
    // Info Panel Logic
    const titleEl = document.getElementById('info-title');
    const descEl = document.getElementById('info-desc');
    const btnEl = document.getElementById('info-btn');

    function setInfo(title, desc) {
      titleEl.innerText = title;
      descEl.innerText = desc;
      btnEl.innerText = 'Launch';
    }

    function resetInfo() {
      titleEl.innerText = 'Opta Stack';
      descEl.innerText = 'Hover over the orbital arc to interact with your installed tools and runtimes.';
      btnEl.innerText = 'Update All';
    }

    // Particle Background Logic (from Logo Template)
    const c = document.getElementById('void-canvas');
    const ctx = c.getContext('2d');
    
    // Fit canvas to window size
    c.width = 1000;
    c.height = 650;
    
    // Center focus for particles - slightly offset to the left to align with the arc
    const cx = 350, cy = 325;

    const particles = [];
    const N = 150;
    for (let i = 0; i < N; i++) {
      const angle = Math.random() * Math.PI * 2;
      const t = Math.pow(Math.random(), 2.2);
      const r = 30 + t * 400; // expanded radius
      const distFactor = 1 - (r / 500);
      const violet = Math.random() > 0.35;
      particles.push({
        x: cx + Math.cos(angle) * r,
        y: cy + Math.sin(angle) * r,
        r: (0.4 + Math.random() * 1.6) * (0.4 + Math.max(0, distFactor) * 0.8),
        alpha: (0.06 + Math.random() * 0.25) * (0.3 + Math.max(0, distFactor) * 0.9),
        violet,
        speed: (Math.random() * 0.2 + 0.05) * (Math.random() > 0.5 ? 1 : -1)
      });
    }

    const sparks = [];
    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const t = Math.pow(Math.random(), 3.0);
      const r = 55 + t * 200;
      const nearness = 1 - (r / 300);
      sparks.push({
        x: cx + Math.cos(angle) * r,
        y: cy + Math.sin(angle) * r,
        r: (0.6 + Math.random() * 1.0) * (0.5 + Math.max(0, nearness)),
        alpha: (0.4 + Math.random() * 0.6) * (0.4 + Math.max(0, nearness) * 0.7),
        violet: Math.random() > 0.25,
        speed: (Math.random() * 0.5 + 0.1) * (Math.random() > 0.5 ? 1 : -1)
      });
    }

    let time = 0;
    function draw() {
      ctx.clearRect(0, 0, c.width, c.height);
      time += 0.01;

      // Glow behind the arc
      const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, 250);
      core.addColorStop(0,   'rgba(168,85,247,0.08)');
      core.addColorStop(0.4, 'rgba(168,85,247,0.04)');
      core.addColorStop(1,   'rgba(168,85,247,0.00)');
      ctx.fillStyle = core;
      ctx.fillRect(0, 0, c.width, c.height);

      particles.forEach(p => {
        // Slow rotation
        const dx = p.x - cx;
        const dy = p.y - cy;
        const angle = Math.atan2(dy, dx) + p.speed * 0.01;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        p.x = cx + Math.cos(angle) * dist;
        p.y = cy + Math.sin(angle) * dist;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.violet
          ? `rgba(168,85,247,${p.alpha})`
          : `rgba(250,250,250,${p.alpha * 0.6})`;
        ctx.fill();
      });

      sparks.forEach(p => {
        const dx = p.x - cx;
        const dy = p.y - cy;
        const angle = Math.atan2(dy, dx) + p.speed * 0.015;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        p.x = cx + Math.cos(angle) * dist;
        p.y = cy + Math.sin(angle) * dist;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.violet
          ? `rgba(192,132,252,${p.alpha})`
          : `rgba(255,255,255,${p.alpha * 0.7})`;
        ctx.fill();
      });

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
