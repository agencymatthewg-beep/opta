<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Opta Init - Prototype 14: Full Orbit</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { background: #000; color: #fff; font-family: 'Sora', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .window { width: 1000px; height: 650px; background: radial-gradient(ellipse at center, #0d0c14 0%, #09090b 70%); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; position: relative; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.9); }
    #void-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    
    .topbar { position: absolute; top: 30px; left: 30px; z-index: 10; font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 0.2em; color: rgba(255,255,255,0.5); font-weight: 600; }
    .topbar span { color: #fff; }

    .orbit-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; z-index: 5; }
    .orbit-ring { position: absolute; inset: 0; border-radius: 50%; border: 1px dashed rgba(255,255,255,0.05); pointer-events: none; }
    
    .center-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 300px; pointer-events: none; }
    
    .app-item { position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; transform: translate(-50%, -50%); }
    
    .purple-circle {
      position: absolute; width: 80px; height: 80px; border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.9) 0%, rgba(168,85,247,0.2) 70%, transparent 100%);
      opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 30px rgba(168,85,247,0.6); pointer-events: none; z-index: 1;
    }
    
    .app-logo { width: 56px; height: 56px; border-radius: 50%; object-fit: contain; z-index: 2; transition: all 0.3s; mix-blend-mode: screen; }
    
    .app-item:hover .purple-circle { opacity: 1; transform: scale(1.6); }
    .app-item:hover .app-logo { transform: scale(1.2); filter: drop-shadow(0 0 10px rgba(168,85,247,0.5)); }
    .app-item:hover { z-index: 20; }

    /* Positions for 8 items */
    .pos-1 { top: 0%; left: 50%; }
    .pos-2 { top: 14.6%; left: 85.3%; }
    .pos-3 { top: 50%; left: 100%; }
    .pos-4 { top: 85.3%; left: 85.3%; }
    .pos-5 { top: 100%; left: 50%; }
    .pos-6 { top: 85.3%; left: 14.6%; }
    .pos-7 { top: 50%; left: 0%; }
    .pos-8 { top: 14.6%; left: 14.6%; }
  </style>
</head>
<body>
  <div class="window">
    <canvas id="void-canvas"></canvas>
    <div class="topbar">OPTA <span>INIT</span></div>
    
    <div class="orbit-container">
      <div class="orbit-ring"></div>
      
      <div class="center-info" id="info-panel">
        <h1 class="text-3xl font-bold mb-2 text-white">Ecosystem</h1>
        <p class="text-sm text-gray-400">Select an application</p>
      </div>

      <!-- App 1: LMX -->
      <div class="app-item pos-1" onmouseenter="setInfo('Opta LMX', 'The core local inference engine.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div><img src="../../design/logos/Opta-LMX/opta-lmx-logo-final.png" class="app-logo">
      </div>
      <!-- App 2: CLI -->
      <div class="app-item pos-2" onmouseenter="setInfo('Opta CLI', 'Command-line orchestration.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div><img src="../../design/logos/Opta-CLI/opta-cli-logo-final.png" class="app-logo">
      </div>
      <!-- App 3: Code -->
      <div class="app-item pos-3" onmouseenter="setInfo('Opta Code', 'Desktop IDE surface.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div><img src="../../design/logos/Opta-Code-Desktop/opta-code-logo-final.png" class="app-logo">
      </div>
      <!-- App 4: Local -->
      <div class="app-item pos-4" onmouseenter="setInfo('Opta Local', 'Web management dashboard.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div><img src="../../design/logos/Opta-Local/opta-local-logo-final.png" class="app-logo">
      </div>
      <!-- App 5: Accounts -->
      <div class="app-item pos-5" onmouseenter="setInfo('Opta Accounts', 'Manage local identity.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div><img src="../../design/logos/Opta-Accounts/opta-accounts-logo-final.png" class="app-logo">
      </div>
      <!-- App 6: Status -->
      <div class="app-item pos-6" onmouseenter="setInfo('Opta Status', 'System health monitoring.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div><img src="../../design/logos/Opta-Status/opta-status-logo-final.png" class="app-logo">
      </div>
      <!-- App 7: Help -->
      <div class="app-item pos-7" onmouseenter="setInfo('Opta Help', 'Technical reference docs.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div><img src="../../design/logos/Opta-Help/opta-help-logo-final.png" class="app-logo">
      </div>
      <!-- App 8: Learn -->
      <div class="app-item pos-8" onmouseenter="setInfo('Opta Learn', 'Discovery and guide portal.')" onmouseleave="resetInfo()">
        <div class="purple-circle"></div><img src="../../design/logos/Opta-Learn/opta-learn-logo-final.png" class="app-logo">
      </div>
    </div>
  </div>

  <script>
    const infoPanel = document.getElementById('info-panel');
    function setInfo(title, desc) {
      infoPanel.innerHTML = `<h1 class="text-4xl font-bold mb-2 text-purple-400">${title}</h1><p class="text-sm text-gray-300 mb-6">${desc}</p><button class="bg-purple-500 text-white font-bold px-6 py-2 rounded-xl shadow-[0_0_15px_rgba(168,85,247,0.4)]">Launch</button>`;
    }
    function resetInfo() {
      infoPanel.innerHTML = `<h1 class="text-3xl font-bold mb-2 text-white">Ecosystem</h1><p class="text-sm text-gray-400">Select an application</p>`;
    }

    // Canvas Background
    const c = document.getElementById('void-canvas');
    const ctx = c.getContext('2d');
    c.width = 1000; c.height = 650;
    const cx = 500, cy = 325;
    const particles = [];
    for (let i = 0; i < 150; i++) {
      particles.push({
        angle: Math.random() * Math.PI * 2,
        r: 30 + Math.pow(Math.random(), 2) * 300,
        size: Math.random() * 2,
        speed: (Math.random() * 0.005 + 0.001)
      });
    }
    function draw() {
      ctx.clearRect(0, 0, 1000, 650);
      particles.forEach(p => {
        p.angle += p.speed;
        const x = cx + Math.cos(p.angle) * p.r;
        const y = cy + Math.sin(p.angle) * p.r;
        ctx.beginPath(); ctx.arc(x, y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(168,85,247,0.3)`; ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
