<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opta Init - Prototype 6: Glass Console</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Sora', sans-serif; }
    .window { width: 900px; height: 600px; background: rgba(10, 10, 15, 0.65); backdrop-filter: blur(30px) saturate(150%); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; display: flex; flex-direction: column; box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2); overflow: hidden; }
    .topbar { height: 60px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding: 0 20px; gap: 20px; }
    .tab { font-size: 14px; font-weight: 600; color: #a1a1aa; cursor: pointer; position: relative; height: 100%; display: flex; align-items: center; }
    .tab.active { color: #fff; }
    .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: #f59e0b; }
    .content { padding: 30px; flex: 1; overflow-y: auto; color: #fff; }
    .grid-item { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 20px; transition: all 0.2s; }
    .grid-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(245,158,11,0.3); }
  </style>
</head>
<body>
  <div class="window">
    <div class="topbar">
      <!-- Mac window controls simulation -->
      <div class="flex gap-2 mr-6">
        <div class="w-3 h-3 rounded-full bg-red-500"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
        <div class="w-3 h-3 rounded-full bg-green-500"></div>
      </div>
      <div class="tab active">My Stack</div>
      <div class="tab">Discover Apps</div>
      <div class="tab">Daemon Settings</div>
    </div>
    <div class="content">
      <div class="flex justify-between items-end mb-8">
        <div>
          <h2 class="text-3xl font-bold mb-2">Local Stack</h2>
          <p class="text-gray-400">Manage and orchestrate your installed Opta applications.</p>
        </div>
        <div class="flex items-center gap-2 bg-green-500/10 border border-green-500/30 px-3 py-1.5 rounded-lg text-sm font-mono text-green-400">
          <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
          Daemon Running
        </div>
      </div>

      <div class="space-y-4">
        <div class="grid-item">
          <div class="w-16 h-16 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex justify-center items-center text-white font-bold text-2xl shadow-lg">Init</div>
          <div class="flex-1">
            <h3 class="text-xl font-bold">Opta Init Manager</h3>
            <p class="text-gray-400 text-sm">v1.0.1 • Up to date</p>
          </div>
          <button class="bg-white/10 hover:bg-white/20 text-white font-semibold px-6 py-2 rounded-lg transition">Manage</button>
        </div>

        <div class="grid-item">
          <div class="w-16 h-16 rounded-xl bg-gradient-to-br from-purple-500 to-indigo-600 flex justify-center items-center text-white font-bold text-2xl shadow-lg">LMX</div>
          <div class="flex-1">
            <h3 class="text-xl font-bold">Opta LMX</h3>
            <p class="text-gray-400 text-sm">v2.4.0 • Up to date</p>
          </div>
          <button class="bg-white text-black font-semibold px-6 py-2 rounded-lg transition hover:scale-105">Launch</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
