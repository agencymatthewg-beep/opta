<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Opta Init - Prototype 10: Radial Arc</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { background: #000; color: #fff; font-family: 'Sora', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .window { width: 1000px; height: 650px; background: #09090b; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; display: flex; position: relative; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.9); }
    
    .sidebar { width: 120px; background: rgba(12,12,18,0.5); border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 10; position: relative; }
    
    .main-area { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; position: relative; }
    
    /* The Arc Container */
    .arc-container {
      position: absolute;
      top: 50%;
      left: 120px;
      transform: translateY(-50%);
      height: 600px;
      width: 300px;
      pointer-events: none;
      z-index: 5;
    }

    .app-item { position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
    
    /* Position apps in an arc along the left edge */
    .pos-1 { top: 10%; left: 0px; }
    .pos-2 { top: 25%; left: 40px; }
    .pos-3 { top: 50%; left: 60px; transform: translateY(-50%); }
    .pos-4 { bottom: 25%; left: 40px; }
    .pos-5 { bottom: 10%; left: 0px; }

    .purple-circle {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.6);
      width: 90px; height: 90px; border-radius: 50%;
      background: radial-gradient(circle, rgba(168,85,247,0.9) 0%, rgba(168,85,247,0.2) 70%, transparent 100%);
      opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 40px rgba(168,85,247,0.6);
      z-index: 1; pointer-events: none;
    }
    
    .app-logo { width: 64px; height: 64px; border-radius: 50%; object-fit: contain; z-index: 2; transition: all 0.3s; background: #09090b; }
    
    .app-item:hover .purple-circle { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
    .app-item:hover .app-logo { transform: scale(1.15); box-shadow: 0 0 20px rgba(168,85,247,0.4); }

    .glow-bg { position: absolute; top: 0; bottom: 0; left: 120px; width: 400px; background: radial-gradient(ellipse at left, rgba(168,85,247,0.05) 0%, transparent 70%); pointer-events: none; }

    /* Right side info */
    .info-panel { margin-left: auto; max-width: 400px; text-align: right; }
    .status-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(34,197,94,0.1); color: #22c55e; padding: 6px 12px; border-radius: 999px; font-family: 'JetBrains Mono', monospace; font-size: 12px; border: 1px solid rgba(34,197,94,0.3); margin-bottom: 20px; }
    
  </style>
</head>
<body>
  <div class="window">
    <div class="sidebar">
      <div class="w-8 h-8 rounded-full border-2 border-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.5)] mb-auto"></div>
      <div class="text-xs font-mono text-gray-500 rotate-180" style="writing-mode: vertical-rl;">OPTA INIT</div>
    </div>
    
    <div class="glow-bg"></div>
    
    <div class="arc-container">
      <div class="app-item pos-1">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-LMX/opta-lmx-logo-final.png" class="app-logo">
      </div>
      <div class="app-item pos-2">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-CLI/opta-cli-logo-final.png" class="app-logo">
      </div>
      <div class="app-item pos-3">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-Code-Desktop/opta-code-logo-final.png" class="app-logo">
      </div>
      <div class="app-item pos-4">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-Accounts/opta-accounts-logo-final.png" class="app-logo">
      </div>
      <div class="app-item pos-5">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta/opta-logo.png" class="app-logo">
      </div>
    </div>

    <div class="main-area">
      <div class="info-panel">
        <div class="status-badge"><div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> System Ready</div>
        <h1 class="text-5xl font-bold mb-4">Opta Stack</h1>
        <p class="text-gray-400 mb-8 text-lg">Hover over the orbital arc to interact with your installed tools and runtimes.</p>
        <button class="bg-purple-500 text-white font-bold px-8 py-3 rounded-xl shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:bg-purple-400 transition">Update All</button>
      </div>
    </div>
  </div>
</body>
</html>
