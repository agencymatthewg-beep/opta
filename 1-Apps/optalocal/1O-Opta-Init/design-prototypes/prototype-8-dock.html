<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Opta Init - Prototype 8: Dock Launcher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { background: #000; color: #fff; font-family: 'Sora', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .window { width: 900px; height: 600px; background: #09090b; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.9); }
    
    .hero-area { flex: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .bg-glow { position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(168,85,247,0.1) 0%, transparent 60%); z-index: 0; transition: background 0.3s; }
    
    .dock-container { height: 160px; background: rgba(5,3,10,0.8); border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: center; align-items: center; gap: 30px; padding: 0 40px; }
    
    .app-item { position: relative; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
    
    .purple-circle {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.6);
      width: 90px; height: 90px; border-radius: 50%;
      background: rgba(168,85,247,0.9);
      opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 40px rgba(168,85,247,0.6);
      z-index: 1; pointer-events: none;
    }
    
    .app-logo { width: 70px; height: 70px; border-radius: 50%; object-fit: contain; z-index: 2; transition: all 0.3s; filter: grayscale(50%) brightness(0.8); }
    .app-name { margin-top: 15px; font-size: 13px; font-weight: 600; color: #71717a; transition: color 0.3s; z-index: 2; letter-spacing: 0.05em; }

    .app-item:hover .purple-circle { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    .app-item:hover .app-logo { transform: scale(1.1) translateY(-5px); filter: grayscale(0%) brightness(1.2); }
    .app-item:hover .app-name { color: #fff; transform: translateY(-5px); }
  </style>
</head>
<body>
  <div class="window">
    <div class="hero-area">
      <div class="bg-glow"></div>
      <div class="relative z-10">
        <h1 class="text-5xl font-bold mb-4">Select an Application</h1>
        <p class="text-gray-400 mb-8 max-w-md mx-auto">Hover over the dock below to select and manage your installed Opta components.</p>
      </div>
    </div>
    
    <div class="dock-container">
      <div class="app-item">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-LMX/opta-lmx-logo-final.png" class="app-logo">
        <div class="app-name">Opta LMX</div>
      </div>
      <div class="app-item">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-CLI/opta-cli-logo-final.png" class="app-logo">
        <div class="app-name">Opta CLI</div>
      </div>
      <div class="app-item">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-Code-Desktop/opta-code-logo-final.png" class="app-logo">
        <div class="app-name">Opta Code</div>
      </div>
      <div class="app-item">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta-Local/opta-local-logo-final.png" class="app-logo">
        <div class="app-name">Opta Local</div>
      </div>
      <div class="app-item">
        <div class="purple-circle"></div>
        <img src="../../design/logos/Opta/opta-logo.png" class="app-logo">
        <div class="app-name">Opta Main</div>
      </div>
    </div>
  </div>
</body>
</html>
