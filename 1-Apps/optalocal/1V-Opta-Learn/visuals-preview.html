<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Opta Local Visual Variants</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Sora', sans-serif; background-color: #09090b; color: #a1a1aa; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .bg-void { background-color: #000000; }
  </style>
</head>
<body class="p-12 flex flex-col gap-12 max-w-4xl mx-auto">

  <h1 class="text-3xl font-bold text-white mb-4">Gemdesign Visual Enhancements</h1>

  <!-- Variant 1: Animated Ecosystem Node Map -->
  <div class="border border-white/10 rounded-xl p-8 bg-[#0a0a0f] relative overflow-hidden group">
    <div class="absolute inset-0 bg-gradient-to-br from-[#22c55e]/10 to-transparent opacity-50"></div>
    <h3 class="text-white text-lg font-semibold mb-6 relative z-10">1. Ecosystem Node Map</h3>
    <div class="flex items-center justify-between relative z-10 font-mono text-sm">
       <div class="flex flex-col items-center gap-2 p-4 bg-void border border-white/10 rounded-lg shadow-lg z-20">
         <div class="w-8 h-8 rounded-full border border-[#22c55e] flex items-center justify-center text-[#22c55e]">CLI</div>
         <span class="text-[#52525b] text-xs">Terminal</span>
       </div>
       
       <div class="h-[2px] flex-1 mx-4 bg-gradient-to-r from-[#22c55e]/50 to-[#a855f7]/50 relative">
         <div class="absolute w-2 h-2 rounded-full bg-white top-1/2 left-1/4 -translate-x-1/2 -translate-y-1/2 shadow-[0_0_8px_white] animate-pulse"></div>
       </div>
       
       <div class="flex flex-col items-center gap-2 p-4 bg-void border border-white/10 rounded-lg shadow-lg z-20">
         <div class="w-8 h-8 rounded-full border border-white/20 flex items-center justify-center text-white/50">D</div>
         <span class="text-[#52525b] text-xs">Daemon</span>
       </div>
       
       <div class="h-[2px] flex-1 mx-4 bg-gradient-to-r from-white/20 to-[#a855f7]/50 relative"></div>
       
       <div class="flex flex-col items-center gap-2 p-4 bg-void border border-white/10 rounded-lg shadow-lg z-20">
         <div class="w-8 h-8 rounded-full border border-[#a855f7] flex items-center justify-center text-[#a855f7]">LMX</div>
         <span class="text-[#52525b] text-xs">Inference</span>
       </div>
    </div>
  </div>

  <!-- Variant 2: Chat vs Do Visual Comparison -->
  <div class="grid grid-cols-2 gap-6">
    <div class="border border-white/10 rounded-xl bg-void shadow-inner flex flex-col gap-3 p-6">
      <div class="flex items-center gap-2 text-[#06b6d4] font-mono text-sm uppercase tracking-wider mb-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
        Chat Mode
      </div>
      <div class="flex-1 border-l-2 border-white/10 pl-4 py-2 flex flex-col gap-3">
        <div class="w-3/4 h-2 bg-white/10 rounded"></div>
        <div class="w-1/2 h-2 bg-[#06b6d4]/40 rounded"></div>
        <div class="w-full h-2 bg-white/10 rounded"></div>
        <div class="w-2/3 h-2 bg-[#06b6d4]/40 rounded"></div>
      </div>
      <div class="text-xs text-[#52525b] mt-2 border-t border-white/5 pt-2">Interactive, user-steered, prompt-driven.</div>
    </div>
    
    <div class="border border-white/10 rounded-xl bg-void shadow-inner flex flex-col gap-3 p-6">
      <div class="flex items-center gap-2 text-[#f59e0b] font-mono text-sm uppercase tracking-wider mb-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        Do Mode
      </div>
      <div class="flex-1 flex flex-col gap-3 relative py-2">
         <div class="absolute left-[7px] top-4 bottom-2 w-[2px] bg-white/10"></div>
         <div class="flex items-center gap-4 relative z-10"><div class="w-4 h-4 rounded-full bg-void border-2 border-[#f59e0b]"></div><div class="w-1/2 h-2 bg-white/20 rounded"></div></div>
         <div class="flex items-center gap-4 relative z-10"><div class="w-4 h-4 rounded-full bg-void border-2 border-[#f59e0b]"></div><div class="w-2/3 h-2 bg-white/20 rounded"></div></div>
         <div class="flex items-center gap-4 relative z-10"><div class="w-4 h-4 rounded-full bg-[#f59e0b]"></div><div class="w-1/3 h-2 bg-[#f59e0b]/50 rounded"></div></div>
      </div>
      <div class="text-xs text-[#52525b] mt-2 border-t border-white/5 pt-2">Autonomous, agentic loop, goal-driven.</div>
    </div>
  </div>

  <!-- Variant 3: Permission Gateway -->
  <div class="border border-[#f59e0b]/30 bg-[#f59e0b]/5 rounded-xl p-8 relative">
    <div class="absolute top-0 right-0 px-4 py-1.5 bg-[#f59e0b]/20 text-[#f59e0b] font-mono text-xs rounded-bl-lg rounded-tr-xl font-bold tracking-wider">Permission Gateway</div>
    <h3 class="text-white text-lg font-semibold mb-6">3. Tool Execution Engine</h3>
    <div class="flex flex-col gap-4 font-mono text-sm">
      <div class="flex items-center gap-4 bg-void p-3 rounded-lg border border-[#22c55e]/30">
         <div class="w-2.5 h-2.5 rounded-full bg-[#22c55e] animate-pulse"></div>
         <span class="text-white">read_file</span>
         <span class="ml-auto text-xs text-[#22c55e]">Auto-approved</span>
      </div>
      <div class="flex items-center gap-4 bg-void p-3 rounded-lg border border-[#f59e0b]/50 shadow-[0_0_15px_rgba(245,158,11,0.15)] relative overflow-hidden">
         <div class="absolute left-0 top-0 bottom-0 w-1 bg-[#f59e0b]"></div>
         <div class="w-2.5 h-2.5 rounded-full bg-[#f59e0b] ml-1"></div>
         <span class="text-white">run_shell_command</span>
         <span class="ml-auto text-xs text-[#f59e0b] bg-[#f59e0b]/10 px-2 py-1 rounded">Requires Approval</span>
      </div>
    </div>
  </div>

</body>
</html>
