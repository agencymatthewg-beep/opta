<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Opta Local Visual Variant 2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
    body { font-family: 'Sora', sans-serif; background-color: #09090b; color: #a1a1aa; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .bg-void { background-color: #000000; }
  </style>
</head>
<body class="p-12 flex flex-col gap-12 max-w-4xl mx-auto">
  <h1 class="text-3xl font-bold text-white mb-4">Variant 2: Chat vs Do Visual Comparison</h1>
  <p class="text-lg leading-relaxed">This goes in the "Two Modes of Operation" section to visually differentiate standard linear chat from the branching, autonomous agent loop.</p>

  <div class="grid grid-cols-2 gap-6">
    <div class="border border-white/10 rounded-xl bg-void shadow-inner flex flex-col gap-3 p-6">
      <div class="flex items-center gap-2 text-[#06b6d4] font-mono text-sm uppercase tracking-wider mb-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
        Chat Mode
      </div>
      <div class="flex-1 border-l-2 border-white/10 pl-4 py-2 flex flex-col gap-3">
        <div class="w-3/4 h-2 bg-white/10 rounded"></div>
        <div class="w-1/2 h-2 bg-[#06b6d4]/40 rounded"></div>
        <div class="w-full h-2 bg-white/10 rounded"></div>
        <div class="w-2/3 h-2 bg-[#06b6d4]/40 rounded"></div>
      </div>
      <div class="text-xs text-[#52525b] mt-2 border-t border-white/5 pt-2">Interactive, user-steered, prompt-driven.</div>
    </div>
    
    <div class="border border-white/10 rounded-xl bg-void shadow-inner flex flex-col gap-3 p-6">
      <div class="flex items-center gap-2 text-[#f59e0b] font-mono text-sm uppercase tracking-wider mb-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        Do Mode
      </div>
      <div class="flex-1 flex flex-col gap-3 relative py-2">
         <div class="absolute left-[7px] top-4 bottom-2 w-[2px] bg-white/10"></div>
         <div class="flex items-center gap-4 relative z-10"><div class="w-4 h-4 rounded-full bg-void border-2 border-[#f59e0b]"></div><div class="w-1/2 h-2 bg-white/20 rounded"></div></div>
         <div class="flex items-center gap-4 relative z-10"><div class="w-4 h-4 rounded-full bg-void border-2 border-[#f59e0b]"></div><div class="w-2/3 h-2 bg-white/20 rounded"></div></div>
         <div class="flex items-center gap-4 relative z-10"><div class="w-4 h-4 rounded-full bg-[#f59e0b]"></div><div class="w-1/3 h-2 bg-[#f59e0b]/50 rounded"></div></div>
      </div>
      <div class="text-xs text-[#52525b] mt-2 border-t border-white/5 pt-2">Autonomous, agentic loop, goal-driven.</div>
    </div>
  </div>
</body>
</html>
