<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototype 1: Subtle Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#09090b',
                        surface: '#18181b',
                        primary: '#8b5cf6',
                        'primary-glow': '#a855f7',
                        'text-primary': '#fafafa',
                        'text-muted': '#52525b'
                    },
                    fontFamily: {
                        sans: ['Sora', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #09090b;
            color: #fafafa;
        }

        /* Prototype 1 Scrollbar: Subtle Glass */
        .sidebar-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }

        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.2);
            border-radius: 4px;
            border: 1px solid rgba(139, 92, 246, 0.1);
        }

        .sidebar-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 92, 246, 0.4);
        }

        /* Buttons: Solid filling, glow hover */
        .btn-pairing {
            background: rgba(139, 92, 246, 0.85);
            /* Solid primary */
            border: none;
            color: #fff;
            padding: 0.85rem 2rem;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
            font-weight: 500;
        }

        .btn-pairing:hover {
            background: #a855f7;
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.6);
        }

        .btn-setup {
            background: rgba(255, 255, 255, 0.05);
            /* Ghost style */
            border: none;
            color: #fafafa;
            padding: 0.85rem 2rem;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            font-weight: 500;
        }

        .btn-setup:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-56 flex-shrink-0 flex flex-col border-r border-white/5 bg-black/40 backdrop-blur-md">
        <div class="px-5 py-4 border-b border-white/5 font-bold tracking-wider text-sm flex gap-3 items-center">
            <div class="w-6 h-6 bg-primary/20 rounded shadow-[0_0_10px_rgba(139,92,246,0.5)]"></div>
            OPTA LMX
        </div>
        <nav class="flex-1 overflow-y-auto py-4 px-3 sidebar-scroll">
            <div class="mb-6">
                <p class="text-[10px] font-semibold uppercase tracking-widest text-text-muted mb-2 px-2">Core</p>
                <div class="flex flex-col gap-1">
                    <a href="#"
                        class="px-3 py-2 text-sm rounded bg-primary/15 text-primary border border-primary/20">Overview</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Models</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Compress</a>
                    <!-- Dummy items for scrolling -->
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Agents</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Skills</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Presets</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Playground</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Knowledge</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Audio</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Metrics</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Forecasts</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Compare</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Benchmark</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Sessions</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Logs</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Diagnostics</a>
                    <a href="#" class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Bot
                        Connection</a>
                    <a href="#" class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Health
                        Check</a>
                    <a href="#" class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Pair
                        Device</a>
                    <a href="#"
                        class="px-3 py-2 text-sm rounded text-white/60 hover:text-white hover:bg-white/5">Settings</a>
                </div>
            </div>
        </nav>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto relative flex flex-col items-center justify-center p-10">
        <div
            class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_zero,rgba(139,92,246,0.15)_0,transparent_60%)] pointer-events-none">
        </div>
        <div class="relative z-10 text-center">
            <h1 class="text-2xl font-semibold mb-2">Opta LMX Dashboard</h1>
            <p class="text-sm text-text-muted max-w-md mx-auto mb-8">
                The primary management surface for your local AI inference engine.
            </p>
            <div class="flex gap-4 justify-center items-center">
                <button class="btn-pairing">Start Pairing</button>
                <button class="btn-setup">Setup Checks</button>
            </div>
        </div>
    </main>
</body>

</html>
